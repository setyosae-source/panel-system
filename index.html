async function loadPOs() {
  const { data } = await sb.from('purchase_orders').select('*,po_items(*),po_docs(*),po_pk(*),po_pic(*,app_users(id,full_name,role)),po_logs(*)').order('created_at', { ascending: false });
  allPOs = data || [];
  renderPOStats();
  renderPOTable();
  const nbPO = document.getElementById('nbPO');
  if (nbPO) nbPO.textContent = allPOs.filter(p => p.status !== 'Selesai').length;
}

function renderPOStats() {
  const active = allPOs.filter(p => p.status !== 'Selesai').length;
  const eng = allPOs.filter(p => p.status === 'Engineering').length;
  const prod = allPOs.filter(p => ['Produksi', 'QC'].includes(p.status)).length;
  const done = allPOs.filter(p => p.status === 'Selesai').length;
  const s = id => document.getElementById(id);
  if (s('poActive')) { s('poActive').textContent = active; s('poEng').textContent = eng; s('poProd').textContent = prod; s('poDone').textContent = done; }
}

function sortPO(field) {
  if (poSort.field === field) poSort.dir = poSort.dir === 'asc' ? 'desc' : 'asc';
  else { poSort.field = field; poSort.dir = 'asc'; }
  document.querySelectorAll('.sort-arrow').forEach(el => { el.textContent = ''; el.classList.remove('active'); });
  const arr = document.getElementById('sarr_' + field);
  if (arr) { arr.textContent = poSort.dir === 'asc' ? '▲' : '▼'; arr.classList.add('active'); }
  renderPOTable();
}

function renderPOTable() {
  const q = poSearch.toLowerCase();
  let rows = allPOs.filter(p => [p.no_po, p.customer_name, p.project_name, p.no_project].join(' ').toLowerCase().includes(q) && (!poFilter.length || poFilter.includes(p.status)));
  rows.sort((a, b) => {
    const av = a[poSort.field] || '', bv = b[poSort.field] || '';
    if (poSort.field === 'status') { return (PO_STATUS_ORDER.indexOf(av) - PO_STATUS_ORDER.indexOf(bv)) * (poSort.dir === 'asc' ? 1 : -1); }
    return av.localeCompare(bv) * (poSort.dir === 'asc' ? 1 : -1);
  });
  const tbody = document.getElementById('poTableBody');
  if (!tbody) return;
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="6">${noData('Belum ada PO')}</td></tr>`; return; }
  tbody.innerHTML = rows.map(p => {
    const overdue = p.tgl_target_kirim && p.tgl_target_kirim < today() && p.status !== 'Selesai';
    return `<tr onclick="openPODetail('${p.id}')">
      <td class="mono">${p.no_po}</td>
      <td>${fmtDate(p.tgl_po)}</td>
      <td style="font-weight:500">${p.customer_name || '—'}</td>
      <td style="color:var(--text2)">${p.project_name || '—'}</td>
      <td style="color:${overdue ? 'var(--red)' : 'var(--text2)'}">${fmtDate(p.tgl_target_kirim)}${overdue ? ' ⚠' : ''}</td>

    </tr>`;
  }).join('');
}

// PO DETAIL
async function openPODetail(id) {
  let p = allPOs.find(x => x.id === id);
  if (!p) {
    const { data } = await sb.from('purchase_orders').select('*,po_items(*,item_specs(*)),po_docs(*),po_pk(*,pk_docs(*)),po_pic(*,app_users(id,full_name,role)),po_logs(*)').eq('id', id).single();
    p = data;
  }
  if (!p) return;

  const canManage = isAdmin();
  const statusIdx = PO_STATUS_ORDER.indexOf(p.status);

  // Stepper
  const activeStepper = PO_STATUS_ORDER.filter(s => {
    if (s === 'FAT' && !p.has_fat) return false;
    if (s === 'Instalasi' && !p.has_instalasi) return false;
    if (s === 'Commissioning' && !p.has_commissioning) return false;
    return true;
  });
  const stepperHtml = `<div class="stepper">${activeStepper.map((s, i) => {
    const sIdx = PO_STATUS_ORDER.indexOf(s);
    const cls = sIdx < statusIdx ? 'done' : sIdx === statusIdx ? 'active' : '';
    return (i > 0 ? '<div class="step-arrow"></div>' : '') + `<div class="step-pill ${cls}">${s}</div>`;
  }).join('')}</div>`;

  // Docs by type
  const docsByType = {};
  (p.po_docs || []).forEach(d => { if (!docsByType[d.doc_type]) docsByType[d.doc_type] = []; docsByType[d.doc_type].push(d); });

  const DOC_STAGES = [
    { key: 'File PO', label: 'File PO', stage: 'Terima PO' },
    { key: 'Approval Drawing', label: 'Approval Drawing', stage: 'Engineering' },
    { key: 'Drawing Approved', label: 'Drawing Approved', stage: 'Engineering' },
    { key: 'BOM', label: 'Dokumen BOM', stage: 'Engineering' },
    { key: 'Laporan Produksi', label: 'Laporan Produksi', stage: 'Produksi' },
    { key: 'Routine Test Report', label: 'Routine Test Report', stage: 'QC' },
    ...(p.has_fat ? [{ key: 'FAT Report', label: 'FAT Report', stage: 'FAT' }] : []),
    { key: 'Surat Jalan', label: 'Surat Jalan / DO / DN', stage: 'Pengiriman' },
    ...(p.has_instalasi ? [{ key: 'SAT', label: 'SAT Report', stage: 'Instalasi' }] : []),
    ...(p.has_commissioning ? [{ key: 'BAST', label: 'BAST', stage: 'Commissioning' }] : []),
    { key: 'Tambahan', label: 'Dokumen Lainnya', stage: '' },
  ];

  const docsHtml = DOC_STAGES.map(ds => {
    const docs = docsByType[ds.key] || [];
    const isCurrentStage = p.status === ds.stage;
    const canUpload = canManage || (ds.stage === 'Engineering' && can('po_engineering')) || (ds.stage === 'Produksi' && can('po_produksi')) || (ds.stage === 'QC' && can('po_qc')) || (ds.stage === 'Pengiriman' && can('po_logistik')) || (['Instalasi'].includes(ds.stage) && (can('po_instalasi'))) || (ds.stage === 'Commissioning' && (can('po_commissioning')));
    const isRestricted = ['File PO', 'BOM', 'Dokumen PK'].includes(ds.key);
    const uploadBtn = canUpload ? `<button class="btn btn-sm" onclick="document.getElementById('poup_${ds.key.replace(/\s/g,'_')}_${p.id}').click()">+ Upload</button><input type="file" id="poup_${ds.key.replace(/\s/g,'_')}_${p.id}" multiple style="display:none" onchange="uploadPODoc('${p.id}','${ds.key}',${isRestricted},this)">` : '';
    return `<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;font-weight:600;color:${isCurrentStage ? 'var(--text)' : 'var(--text3)'}">${ds.label}</span>${isCurrentStage ? '<span style="font-size:10px;background:var(--amber-bg);color:var(--amber);padding:1px 6px;border-radius:4px;font-weight:700">Stage aktif</span>' : ''}${isRestricted ? '<span style="font-size:10px;background:var(--red-bg);color:var(--red);padding:1px 6px;border-radius:4px;font-weight:700">🔒</span>' : ''}</div>
        ${uploadBtn}
      </div>
      ${renderFileList(docs, 'po-docs', canManage, 'deletePODoc')}
    </div>`;
  }).join('');

  // Items
  const items = p.po_items || [];
  const itemsHtml = items.length ? items.map(it => `
    <div class="item-card">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${it.category}${it.model_name ? ' — ' + it.model_name : ''}</div>
        <div style="font-size:11px;color:var(--text3)">Qty: ${it.qty} &middot; ${it.is_produksi ? '🏭 Diproduksi' : '📦 Non-produksi'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        ${canManage ? `<button class="btn btn-sm" style="font-size:11px" data-iid="${it.id}" data-pid="${p.id}" onclick="openSimpleItemForm(this.dataset.iid,this.dataset.pid)">Edit</button>` : ''}
      </div>
    </div>`).join('') : noData('Belum ada item');

  // PK
  const pks = p.po_pk || [];
  const totalPK = pks.reduce((s, k) => s + (k.nilai_pengajuan || 0), 0);
  const pksHtml = pks.length ? pks.map(k => `
    <div class="pk-card">
      <div class="pk-header"><div style="font-size:13px;font-weight:600">${k.keperluan}</div><span style="font-size:11px;font-weight:600;background:var(--surface2);padding:2px 8px;border-radius:20px">${k.status}</span></div>
      <div style="font-size:12px;color:var(--text2)">Pengajuan: <strong>${fmtRp(k.nilai_pengajuan)}</strong>${k.nilai_realisasi ? ' &middot; Realisasi: ' + fmtRp(k.nilai_realisasi) : ''} &middot; ${fmtDate(k.tgl_pengajuan)}</div>
      ${can('po_pk') ? `<div style="margin-top:6px;display:flex;gap:6px"><button class="btn btn-sm" onclick="openPKStatusModal('${k.id}','${p.id}')">Update Status</button><button class="btn btn-sm" onclick="openPKForm('${p.id}','${k.id}')">Edit</button></div>` : ''}
    </div>`) .join('') + `<div style="font-size:12px;color:var(--text3);margin-top:4px">Total pengajuan: <strong style="color:var(--text)">${fmtRp(totalPK)}</strong></div>` : noData('Belum ada PK');

  // Logs
  const logs = (p.po_logs || []).slice().reverse();
  const logsHtml = logs.length ? logs.map(l => `<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text3);flex-shrink:0;min-width:110px">${fmtDateTime(l.created_at)}</span><span style="font-weight:500">${l.action}</span>${l.detail ? '<span style="color:var(--text2)"> — ' + l.detail + '</span>' : ''}</div>`).join('') : '<div style="font-size:12px;color:var(--text3)">Belum ada riwayat</div>';

  openModal(`<div class="modal" style="max-width:780px">
    <div class="modal-header">
      <div>
        <h2>${p.no_po}${p.project_name ? ' — ' + p.project_name : ''}</h2>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">${p.customer_name || '—'} &middot; ${fmtDate(p.tgl_po)}${p.no_project ? ' &middot; ' + p.no_project : ''}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeAllModals()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="detail-section">
        <div class="sect-title">Info PO</div>
        <div class="kv">
          <span class="k">Customer</span><span class="v">${p.customer_name || '—'}</span>
          <span class="k">Target Kirim</span><span class="v">${fmtDate(p.tgl_target_kirim)}</span>
          <span class="k">Nilai PO</span><span class="v">${can('nilai_po') ? fmtRp(p.nilai_po) : '<span class="restricted-blur">Rp 999.999.999</span>'}</span>
          <span class="k">FAT / Instalasi / Comm</span><span class="v">${[p.has_fat && 'FAT', p.has_instalasi && 'Instalasi', p.has_commissioning && 'Commissioning'].filter(Boolean).join(' &middot; ') || '—'}</span>
        </div>
        ${p.catatan ? `<div class="desc-box">${p.catatan}</div>` : ''}

      </div>
      <div class="detail-section">
        <div class="sect-title">Dokumen</div>
        ${docsHtml}
      </div>
      <div class="detail-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="sect-title" style="margin-bottom:0">Item / Unit (${items.length})</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${canManage ? `<button class="btn btn-sm" onclick="openSimpleItemForm(null,'${p.id}')">+ Tambah Item</button>` : ''}
            
          </div>
        </div>
        ${itemsHtml}
      </div>
      ${can('bom_view') ? `<div class="detail-section" id="poBomSection_${p.id}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="sect-title" style="margin-bottom:0">BOM Terkait</div>
          ${can('bom_manage') ? `<button class="btn btn-sm" onclick="closeAllModals();openBOMForm({poId:'${p.id}'})">+ Generate BOM</button>` : ''}
        </div>
        <div id="poBomList_${p.id}"><span class="spinner"></span> Memuat...</div>

async function uploadPODoc(poId, docType, isRestricted, input) {
  for (const f of Array.from(input.files)) {
    const path = `${poId}/${docType.replace(/\s/g, '_')}/${Date.now()}_${f.name}`;
    const { error } = await sb.storage.from('po-docs').upload(path, f);
    if (!error) {
      await sb.from('po_docs').insert({ po_id: poId, doc_type: docType, file_name: f.name, file_path: path, file_size: f.size, is_restricted: isRestricted, uploaded_by: currentUser.id });
      await logPO(poId, 'Upload Dokumen', docType + ': ' + f.name);
      toast(f.name + ' diupload');
    } else toast('Gagal: ' + f.name);
  }
  input.value = '';
  await checkDocTrigger(poId, docType);
  await loadPOs();
  openPODetail(poId);
}

async function deletePODoc(docId, filePath, fileName) {
  if (!confirm('Hapus dokumen "' + fileName + '"?')) return;
  await sb.storage.from('po-docs').remove([filePath]);
  await sb.from('po_docs').delete().eq('id', docId);
  const poId = filePath.split('/')[0];
  await logPO(poId, 'Hapus Dokumen', fileName);
  toast('Dokumen dihapus');
  await loadPOs();
  openPODetail(poId);
}

// DOC TRIGGER
const DOC_TRIGGERS = {
  'File PO': { nextStatus: 'Engineering', currentStatus: 'Terima PO' },
  'Drawing Approved': { nextStatus: 'Produksi', currentStatus: 'Engineering', requireAlso: 'Approval Drawing' },
  'Routine Test Report': { nextStatus: null, currentStatus: 'QC' },
  'FAT Report': { nextStatus: 'Pengiriman', currentStatus: 'FAT' },
  'Surat Jalan': { nextStatus: null, currentStatus: 'Pengiriman' },
  'SAT': { nextStatus: null, currentStatus: 'Instalasi' },
  'BAST': { nextStatus: 'Selesai', currentStatus: 'Commissioning' },
};

async function checkDocTrigger(poId, docType) {
  const trigger = DOC_TRIGGERS[docType];
  if (!trigger) return;
  const { data: p } = await sb.from('purchase_orders').select('*,po_docs(*)').eq('id', poId).single();
  if (!p) return;
  const curIdx = PO_STATUS_ORDER.indexOf(p.status);
  const trigIdx = PO_STATUS_ORDER.indexOf(trigger.currentStatus);
  if (curIdx > trigIdx) return;
  if (trigger.requireAlso) {
    const docs = p.po_docs || [];
    if (!docs.some(d => d.doc_type === trigger.requireAlso)) { toast('Upload ' + trigger.requireAlso + ' terlebih dahulu'); return; }
  }
  let nextStatus = trigger.nextStatus;
  if (!nextStatus) {
    if (docType === 'Routine Test Report') nextStatus = p.has_fat ? 'FAT' : 'Pengiriman';
    else if (docType === 'Surat Jalan') nextStatus = p.has_instalasi ? 'Instalasi' : (p.has_commissioning ? 'Commissioning' : 'Selesai');
    else if (docType === 'SAT') nextStatus = p.has_commissioning ? 'Commissioning' : 'Selesai';
  }
  if (!nextStatus) return;
  if (confirm(`Dokumen "${docType}" diupload.\nPindah status ke "${nextStatus}"?`)) {
    await sb.from('purchase_orders').update({ status: nextStatus, updated_at: new Date().toISOString() }).eq('id', poId);
    await logPO(poId, 'Status Otomatis', '→ ' + nextStatus + ' (via upload ' + docType + ')');
    toast('Status → ' + nextStatus);
  }
}

async function savePO(editId) {
  const btn = document.getElementById('btnSavePO');
  btn.disabled = true; btn.textContent = 'Menyimpan...';
  try {
    const payload = {
      no_po: gv('pfNoPO').trim(), tgl_po: gv('pfTglPO'), customer_name: gv('pfCustomer').trim(),
      project_name: gv('pfProject').trim() || null, tgl_target_kirim: gv('pfTglKirim') || null,
      no_project: gv('pfNoProject').trim() || null, nilai_po: gv('pfNilai').replace(/[^0-9.]/g, '') || null,
      has_fat: document.getElementById('pfFAT').checked, has_instalasi: document.getElementById('pfInstalasi').checked,
      has_commissioning: document.getElementById('pfCommissioning').checked,
      pp_request_id: gv('pfLinkedPP') || null, catatan: gv('pfCatatan').trim() || null,
      updated_at: new Date().toISOString()
    };
    let poId;
    if (editId) {
      await sb.from('purchase_orders').update(payload).eq('id', editId);
      poId = editId;
      await logPO(poId, 'Edit PO', 'Data PO diperbarui');
    } else {
      const { data } = await sb.from('purchase_orders').insert({ ...payload, created_by: currentUser.id }).select().single();
      poId = data.id;
      await logPO(poId, 'PO Dibuat', payload.no_po);
    }
    // Save items
    if (!editId) {
      for (const it of poFormItems) {
        if (!it.category) continue;
        await sb.from('po_items').insert({ po_id: poId, category: it.category, model_name: it.model_name || null, spec_summary: it.spec_summary || null, qty: it.qty, is_produksi: it.is_produksi });
      }
    }
    toast(editId ? 'PO diperbarui' : 'PO dibuat');
    closeAllModals();
    await loadPOs();
    if (poId) openPODetail(poId);
  } catch (e) { toast('Error: ' + e.message); }
  btn.disabled = false; btn.textContent = 'Simpan PO';
}

function openItemSpecFromForm(idx){

    +'</div>';

function buildSpecSummary(cat, spec){
  const v=f=>spec[f]||'';
  if(cat==='Rectifier') return (v('input_fase')+'ph, '+v('input_voltage')+'VAC → '+v('output_voltage')+'VDC '+v('output_current')+'A').replace(/\s+/g,' ').trim();
  if(cat==='UPS') return (v('input_fase')+'ph/'+v('output_fase')+'ph, '+v('output_kva')+'kVA, '+v('input_voltage')+'VAC').replace(/\s+/g,' ').trim();
  if(cat==='Inverter') return (v('dc_input_voltage')+'VDC → '+v('output_voltage')+'VAC '+v('output_kva')+'kVA').replace(/\s+/g,' ').trim();
  if(cat==='Panel ACDB') return ('ACDB '+v('input_fase')+'ph '+v('input_voltage')+'VAC '+v('output_current')+'A').replace(/\s+/g,' ').trim();
  if(cat==='Panel DCDB') return ('DCDB '+v('input_voltage')+'VDC '+v('output_current')+'A').replace(/\s+/g,' ').trim();
  return '';
}

function saveItemSpecFromForm(){
  const {idx, category} = _specFormCtx;
  const fields = SPEC_FIELDS[category]||[];
  const data = {kategori: category};
  fields.forEach(f=>{ const el=document.getElementById('spec_'+f.id); if(el) data[f.id]=el.value.trim()||null; });
  poFormSpecs[idx] = data;
  const modelName = buildModelName(category, data);
  if(modelName) poFormItems[idx].model_name = modelName;
  const specSummary = buildSpecSummary(category, data);
  if(specSummary) poFormItems[idx].spec_summary = specSummary;
  toast('Spec disimpan');
  closeModal('specModal');
  renderPOItems();
}

function dsRenderFiles(spec) {
  ['photos','doc_drawing_approval','doc_asbuilt','doc_fat'].forEach(key => {
    const el = document.getElementById('ds_'+key+'_list');
    if(!el) return;
    const files = spec[key] || [];
    el.innerHTML = files.length
      ? files.map((f,i)=>'<div style="font-size:11px;padding:3px 0;display:flex;align-items:center;gap:6px"><a href="'+f.url+'" target="_blank" style="color:var(--blue);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+f.name+'</a></div>').join('')
      : '<div style="font-size:11px;color:var(--text3);margin-bottom:4px">Belum ada</div>';
  });
}

function dsUpload(field, itemId) {
  document.getElementById('ds_'+field+'_input').click();
}

async function dsHandleUpload(field, itemId, input) {
  const files = Array.from(input.files);
  let existing = {}; try { const r = await sb.from('item_detail_specs').select(field).eq('item_id', itemId).single(); existing = r.data||{}; } catch(e) {}
  const arr = existing?.[field] || [];
  for(const f of files) {
    const path = 'item-docs/'+itemId+'/'+field+'/'+Date.now()+'_'+f.name;
    const {error} = await sb.storage.from('item-docs').upload(path, f);
    if(!error) {
      const url = SB_URL+'/storage/v1/object/public/item-docs/'+path;
      arr.push({name: f.name, url, path});
      toast(f.name+' diupload');
    } else toast('Gagal: '+f.name);
  }
  const update = {};
  update[field] = arr;
  await sb.from('item_detail_specs').upsert({item_id: itemId, ...update}, {onConflict:'item_id'});
  input.value = '';
  try { const r = await sb.from('item_detail_specs').select('*').eq('item_id',itemId).single(); dsRenderFiles(r.data||{}); } catch(e) { dsRenderFiles({}); }
}

function gvds(id) {
  const el = document.getElementById('ds_'+id);
  return el ? el.value.trim() : null;
}

async function saveDetailSpec(itemId, poId) {
  const po = allPOs.find(x=>x.id===poId);
  const item = po?.po_items?.find(i=>i.id===itemId);
  const cat = item?.category;

  const data = {
    item_id: itemId,
    brand: gvds('brand'),
    ip_protection: gvds('ip_protection'),
    colour: gvds('colour'),
    cable_entry: gvds('cable_entry'),
    custom_notes: gvds('custom_notes'),
    updated_at: new Date().toISOString()
  };

  if(cat === 'Rectifier') {
    Object.assign(data, {
      r_parallel_input: document.getElementById('ds_r_parallel_input')?.checked || false,
      r_input_voltage: gvds('r_input_voltage'),
      r_input_phase: gvds('r_input_phase'),
      r_pulse: gvds('r_pulse'),
      r_output_voltage: gvds('r_output_voltage'),
      r_output_current: gvds('r_output_current'),
      r_voltage_adjustable: gvds('r_voltage_adjustable'),
    });
    // Auto power factor based on pulse
    const pulse = parseInt(data.r_pulse||'6');
    data.r_power_factor = pulse >= 12 ? '>0.9' : pulse === 6 ? '>0.8' : '>0.7';
  } else if(cat === 'UPS') {
    Object.assign(data, {
      u_capacity_kva: gvds('u_capacity_kva'),
      u_capacity_kw: gvds('u_capacity_kw'),
      u_rect_input_voltage: gvds('u_rect_input_voltage'),
      u_rect_input_phase: gvds('u_rect_input_phase'),
      u_dc_bus_voltage: gvds('u_dc_bus_voltage'),
      u_dc_bus_current: gvds('u_dc_bus_current'),
      u_inv_output_voltage: gvds('u_inv_output_voltage'),
      u_inv_output_phase: gvds('u_inv_output_phase'),
      u_bypass_voltage: gvds('u_bypass_voltage'),
    });
  } else if(cat === 'Inverter') {
    Object.assign(data, {
      i_capacity_kva: gvds('i_capacity_kva'),
      i_capacity_kw: gvds('i_capacity_kw'),
      i_input_voltage: gvds('i_input_voltage'),
      i_input_tolerance: gvds('i_input_tolerance'),
      i_output_voltage: gvds('i_output_voltage'),
      i_output_phase: gvds('i_output_phase'),
      i_topology: gvds('i_topology'),
    });
  } else if(cat === 'Panel ACDB' || cat === 'Panel DCDB') {
    Object.assign(data, {
      p_input_voltage: gvds('p_input_voltage'),
      p_input_phase: gvds('p_input_phase'),
      p_current_rating: gvds('p_current_rating'),
      p_feeder_count: gvds('p_feeder_count'),
      p_feeder_rating: gvds('p_feeder_rating'),
    });
  }

  const {error} = await sb.from('item_detail_specs').upsert(data, {onConflict:'item_id'});
  if(error) { toast('Error: '+error.message); return; }
  toast('Detail spec disimpan');
  closeAllModals();
  await loadPOs();
  openPODetail(poId);
}

async function savePK(poId, pkId) {
  const kep = gv('pkKep').trim(), tgl = gv('pkTgl'), nilai = gv('pkNilai').replace(/[^0-9.]/g, '');
  if (!kep || !tgl || !nilai) { toast('Lengkapi field wajib'); return; }
  const payload = { keperluan: kep, tgl_pengajuan: tgl, nilai_pengajuan: parseFloat(nilai), no_pk: gv('pkNo').trim() || null, catatan: gv('pkCat').trim() || null };
  if (pkId) { await sb.from('po_pk').update(payload).eq('id', pkId); }
  else { await sb.from('po_pk').insert({ ...payload, id: genId('PK'), po_id: poId, status: 'Diajukan', created_by: currentUser.id }); await logPO(poId, 'PK Diajukan', kep + ' — ' + fmtRp(parseFloat(nilai))); }
  toast('PK disimpan');
  closeAllModals();
  await loadPOs();
  openPODetail(poId);
}

async function openGenSerialModal(poId) {
  const p = allPOs.find(x => x.id === poId);
  const items = (p?.po_items || []).filter(it => it.is_produksi && ['Rectifier','UPS','Inverter','Panel ACDB','Panel DCDB'].includes(it.category) && !it.serial_number);
  if (!items.length) { toast('Tidak ada item yang perlu generate SN'); return; }
  openModal(`<div class="modal modal-sm">

    <div class="modal-body">
      <div class="form-row"><label>Tanggal Produksi <span class="req">*</span></label><input type="date" id="snProdDate" value="${today()}"></div>
      <div style="margin-top:.875rem;font-size:13px;color:var(--text2)">Item yang akan di-generate (${items.length}):</div>
      ${items.map(it => `<div class="item-card" style="margin-top:6px"><span style="font-size:13px;font-weight:600">${it.category}</span>${it.model_name ? '<span style="font-size:12px;color:var(--text3)"> — ' + it.model_name + '</span>' : ''}</div>`).join('')}
    </div>
    <div class="modal-footer">

      <button class="btn btn-primary" onclick="doGenerateSerials('${poId}')">Generate</button>
    </div>
  </div>`);
}

async function doGenerateSerials(poId) {
  const prodDate = gv('snProdDate');
  if (!prodDate) { toast('Pilih tanggal produksi'); return; }
  const p = allPOs.find(x => x.id === poId);
  const items = (p?.po_items || []).filter(it => it.is_produksi && SPEC_CATEGORIES.includes(it.category) && !it.serial_number);
  const dateObj = new Date(prodDate);
  let generated = 0, skipped = 0;
  for (const it of items) {
    let spec = null; try { const _r = await sb.from('item_specs').select('*').eq('item_id', it.id).single(); spec = _r.data; } catch(e) {}
    if (!spec) { skipped++; continue; }
    const { data: counter } = await sb.from('serial_counter').select('*').eq('id', 1).single();
    let { huruf, angka } = counter;
    const sn = buildSerialNumberFromSpec(spec, p.no_project, huruf, angka, dateObj);
    if (!sn) { skipped++; continue; }
    angka++;
    if (angka > 999) { angka = 1; huruf = String.fromCharCode(huruf.charCodeAt(0) + 1); }
    await sb.from('serial_counter').update({ huruf, angka }).eq('id', 1);
    await sb.from('po_items').update({ serial_number: sn, serial_generated_at: new Date().toISOString() }).eq('id', it.id);
    generated++;
  }
  await logPO(poId, 'Generate Serial', generated + ' item' + (skipped ? ', ' + skipped + ' item skip (belum ada spec)' : ''));
  toast(generated + ' SN di-generate' + (skipped ? ', ' + skipped + ' skip (isi spec dulu)' : ''));
  closeAllModals();
  await loadPOs();
  openPODetail(poId);
}

async function loadDownloadFilesPO(poId){
  const po = allPOs.find(x=>x.id===poId);
  const files = po?.download_files || [];
  const el = document.getElementById('dlFileListPO_'+poId);
  if(!el) return;
  el.innerHTML = files.length ? files.map((f,i)=>`
    <div class="file-item">
      <span class="fname" style="cursor:default;text-decoration:none;color:var(--text)">${f.name}</span>
      <div class="file-actions" style="opacity:1">
        <button class="file-act-btn del" data-pid="${poId}" data-idx="${i}" onclick="removeDownloadFilePO(this.dataset.pid,parseInt(this.dataset.idx))">🗑</button>
      </div>
    </div>`).join('') : '<div style="font-size:12px;color:var(--text3)">Belum ada file</div>';
}

async function uploadDownloadFilePO(poId, input){
  const files = Array.from(input.files);
  const {data:po} = await sb.from('purchase_orders').select('download_files').eq('id',poId).single();
  const existing = po?.download_files || [];
  for(const f of files){
    const path = 'downloads/po/'+poId+'/'+Date.now()+'_'+f.name;
    const {error} = await sb.storage.from('po-docs').upload(path, f);
    if(!error){
      const url = SB_URL+'/storage/v1/object/public/po-docs/'+path;
      existing.push({name:f.name, url, path});
      toast(f.name+' diupload');
    } else toast('Gagal: '+f.name);
  }
  await sb.from('purchase_orders').update({download_files: existing}).eq('id',poId);
  input.value='';
  await loadPOs();
  loadDownloadFilesPO(poId);
}

async function removeDownloadFilePO(poId, idx){
  const {data:po} = await sb.from('purchase_orders').select('download_files').eq('id',poId).single();
  const files = po?.download_files || [];
  if(files[idx]?.path) await sb.storage.from('po-docs').remove([files[idx].path]);
  files.splice(idx,1);
  await sb.from('purchase_orders').update({download_files: files}).eq('id',poId);
  await loadPOs();
  loadDownloadFilesPO(poId);
  toast('File dihapus');
}

async function updateInstStatus(newStatus) {
  const {task} = window._instCurrent;
  const now = new Date().toISOString();
  task.status = newStatus;
  const updates = {status: newStatus, updated_at: now};
  if(newStatus === 'Berangkat' && !task.berangkat_at) { updates.berangkat_at = now; task.berangkat_at = now; }
  else if(newStatus === 'Di Lokasi' && !task.di_lokasi_at) { updates.di_lokasi_at = now; task.di_lokasi_at = now; }
  else if(newStatus === 'Selesai' && !task.inst_selesai_at) { updates.inst_selesai_at = now; task.inst_selesai_at = now; }
  renderInstStatus();
  toast('Status diperbarui');
  await sb.from('instalasi_tasks').update(updates).eq('id',task.id);
}

function hitungPKTotal() {
  const t = (parseFloat(gv('pkTransport'))||0) + (parseFloat(gv('pkAkomodasi'))||0) + (parseFloat(gv('pkHarian'))||0) + (parseFloat(gv('pkLain'))||0);
  document.getElementById('pkTotal').textContent = fmtRp(t);
}

async function savePKDinas() {
  const tujuan = gv('pkTujuan').trim();
  if(!tujuan) { toast('Tujuan wajib diisi'); return; }
  const {task} = window._instCurrent;
  const me = currentUser;
  const personel = Array.from(document.querySelectorAll('.pkPersCb:checked')).map(cb=>cb.value);
  
  const transport = parseFloat(gv('pkTransport'))||0;
  const akomodasi = parseFloat(gv('pkAkomodasi'))||0;
  const harian = parseFloat(gv('pkHarian'))||0;
  const lain = parseFloat(gv('pkLain'))||0;
  const total = transport + akomodasi + harian + lain;

  await sb.from('pk_dinas').insert({
    task_id: task.id,
    pengaju_id: me.id,
    tujuan,
    tgl_berangkat: gv('pkBerangkat')||null,
    tgl_pulang: gv('pkPulang')||null,
    personel,
    biaya_transport: transport,
    biaya_akomodasi: akomodasi,
    uang_harian: harian,
    biaya_lain: lain,
    total_pengajuan: total,
    catatan_pengajuan: gv('pkCatatan')||null,
    status: 'Pengajuan'
  });

  toast('Pengajuan PK Dinas tersimpan');
  closeTopModal();
  await renderInstPK();
}

function hitungRzTotal() {
  const t = (parseFloat(gv('rzTransport'))||0) + (parseFloat(gv('rzAkomodasi'))||0) + (parseFloat(gv('rzHarian'))||0) + (parseFloat(gv('rzLain'))||0);

async function saveRealisasiPK(pkId) {
  const transport = parseFloat(gv('rzTransport'))||0;
  const akomodasi = parseFloat(gv('rzAkomodasi'))||0;
  const harian = parseFloat(gv('rzHarian'))||0;
  const lain = parseFloat(gv('rzLain'))||0;
  const total = transport + akomodasi + harian + lain;

  await sb.from('pk_dinas').update({
    realisasi_transport: transport,
    realisasi_akomodasi: akomodasi,
    realisasi_harian: harian,

async function saveSAT() {
  const {task} = window._instCurrent;
  const me = currentUser;

  toast('Mengupload...');
  
  const docs = [];
  for(const f of Array.from(document.getElementById('satDocs').files)) {
    const path = `sat/${task.id}/${Date.now()}_${f.name}`.replace(/\s/g,'_');
    const {error} = await sb.storage.from('service-docs').upload(path, f);
    if(!error) docs.push({name:f.name, url:SB_URL+'/storage/v1/object/public/service-docs/'+path, path});
  }
  
  const photos = [];
  for(const f of Array.from(document.getElementById('satPhotos').files).slice(0,10)) {
    const path = `sat/${task.id}/photo_${Date.now()}_${f.name}`.replace(/\s/g,'_');
    const {error} = await sb.storage.from('service-docs').upload(path, f);
    if(!error) photos.push({name:f.name, url:SB_URL+'/storage/v1/object/public/service-docs/'+path, path});
  }

  const signName = gv('satSignName').trim();
  await sb.from('sat_reports').insert({
    task_id: task.id,
    user_id: me.id,
    judul: gv('satJudul')||null,
    tanggal_test: gv('satTanggal')||null,
    hasil: gv('satHasil')||null,
    catatan: gv('satCatatan')||null,
    signed_by_customer: signName||null,
    signed_position: gv('satSignPos')||null,
    signed_at: signName?new Date().toISOString():null,
    documents: docs,
    photos
  });

  toast('Laporan SAT tersimpan');
  closeTopModal();
  await renderInstSAT();
}

async function saveBAST() {
  const {task} = window._instCurrent;
  const me = currentUser;

  toast('Mengupload...');
  
  const docs = [];
  for(const f of Array.from(document.getElementById('bastDocs').files)) {
    const path = `bast/${task.id}/${Date.now()}_${f.name}`.replace(/\s/g,'_');
    const {error} = await sb.storage.from('service-docs').upload(path, f);
    if(!error) docs.push({name:f.name, url:SB_URL+'/storage/v1/object/public/service-docs/'+path, path});
  }
  
  const photos = [];
  for(const f of Array.from(document.getElementById('bastPhotos').files).slice(0,10)) {
    const path = `bast/${task.id}/photo_${Date.now()}_${f.name}`.replace(/\s/g,'_');
    const {error} = await sb.storage.from('service-docs').upload(path, f);
    if(!error) photos.push({name:f.name, url:SB_URL+'/storage/v1/object/public/service-docs/'+path, path});
  }

  await sb.from('bast_records').insert({
    task_id: task.id,
    user_id: me.id,
    no_bast: gv('bastNo')||null,
    tanggal: gv('bastTgl')||null,
    penyerah_nama: gv('bastPyName')||null,
    penyerah_jabatan: gv('bastPyPos')||null,
    penerima_nama: gv('bastPnName')||null,
    penerima_jabatan: gv('bastPnPos')||null,
    penerima_perusahaan: gv('bastPnPerusahaan')||null,
    catatan: gv('bastCatatan')||null,
    documents: docs,
    photos
  });

  toast('BAST tersimpan');
  closeTopModal();
  await renderInstBAST();
}



async function loadServices() {
  const { data } = await sb.from('service_tickets').select('*,service_logs(*),service_docs(*),app_users!service_tickets_pic_id_fkey(id,full_name)').order('created_at', { ascending: false });
  allServices = data || [];
  renderSvcStats();
  renderSvcTable();
  const nbSVC = document.getElementById('nbSVC');
  if (nbSVC) nbSVC.textContent = allServices.filter(s => s.status !== 'Selesai').length;
}

function renderSvcStats() {
  const total = allServices.length, masuk = allServices.filter(s => s.status === 'Masuk').length, proses = allServices.filter(s => s.status === 'Proses').length, selesai = allServices.filter(s => s.status === 'Selesai').length;
  const el = id => document.getElementById(id);
  if (el('svcTotal')) { el('svcTotal').textContent = total; el('svcMasuk').textContent = masuk; el('svcProses').textContent = proses; el('svcSelesai').textContent = selesai; }
}

function setSvcFilter(status, el) {
  svcFilter = svcFilter === status ? '' : status;
  document.querySelectorAll('#svcStats .stat-card').forEach(c => c.classList.remove('active-filter'));
  if (svcFilter) el.classList.add('active-filter');
  renderSvcTable();
}

function renderSvcTable() {
  const q = svcSearch.toLowerCase();
  let rows = allServices.filter(s => [s.id, s.customer_name, s.deskripsi_masalah, s.site_location].join(' ').toLowerCase().includes(q) && (!svcFilter || s.status === svcFilter));
  const tbody = document.getElementById('svcTableBody');
  if (!tbody) return;
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="6">${noData('Belum ada tiket service')}</td></tr>`; return; }
  tbody.innerHTML = rows.map(s => `
    <tr onclick="openSvcDetail('${s.id}')">
      <td class="mono">${s.id}</td>
      <td>${fmtDate(s.tgl_laporan)}</td>
      <td style="font-weight:500">${s.customer_name || '—'}</td>
      <td style="color:var(--text2)">${s.deskripsi_masalah}</td>
      <td>${s.app_users?.full_name || '—'}</td>
      <td>${badge(s.status)}</td>
    </tr>`).join('');
}

      </div>

    </div>

      <div class="detail-section">
        <div class="kv">

          <span class="k">Masalah</span><span class="v">${s.deskripsi_masalah}</span>
          ${s.po_items ? `<span class="k">Unit</span><span class="v">${s.po_items.category} — ${s.po_items.model_name || ''}${s.po_items.serial_number ? ' (SN: ' + s.po_items.serial_number + ')' : ''}</span>` : ''}
          ${s.unit_info && !s.po_items ? `<span class="k">Info Unit</span><span class="v">${s.unit_info}</span>` : ''}
        </div>
        ${canEdit ? `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">

        </div>` : ''}
      </div>
      <div class="detail-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="sect-title" style="margin-bottom:0">Log Penanganan (${logs.length})</div>

            <button class="btn btn-sm" onclick="document.getElementById('svcUpDoc_${s.id}').click()">📄 Dok.</button><input type="file" id="svcUpDoc_${s.id}" multiple style="display:none" onchange="uploadSvcDoc('${s.id}','document',this)">

async function updateSvcStatus(id, status) {
  const upd = { status, updated_at: new Date().toISOString() };
  if (status === 'Proses') {
    upd.proses_started_at = new Date().toISOString();
  }
  if (status === 'Selesai') {
    upd.closed_at = new Date().toISOString();
    // Auto-create KB entry
    const { data: ticket } = await sb.from('service_tickets').select('*,service_logs(*)').eq('id', id).single();
    if (ticket) {
      const tahapanList = [...new Set((ticket.service_logs || []).map(l => l.tahapan))];
      await sb.from('kb_entries').insert({ ticket_id: id, judul: ticket.deskripsi_masalah?.substring(0, 100) || 'Service Report', kategori_unit: ticket.unit_info || '', ringkasan_masalah: ticket.deskripsi_masalah, ringkasan_solusi: (ticket.service_logs || []).filter(l => l.is_resolved).map(l => l.hasil).filter(Boolean).join('\n') || null, tahapan_digunakan: tahapanList, created_by: currentUser.id });
    }
  }
  await sb.from('service_tickets').update(upd).eq('id', id);
  toast('Status → ' + status);
  await loadServices();
  openSvcDetail(id);
}

async function saveSvcTicket(editId) {
  const customer = gv('svcCustomer').trim(), date = gv('svcDate'), desc = gv('svcDesc').trim(), pic = gv('svcPIC');
  if (!customer || !date || !desc || !pic) { toast('Lengkapi field wajib'); return; }
  const payload = { customer_name: customer, tgl_laporan: date, deskripsi_masalah: desc, pic_id: pic, site_location: gv('svcSite').trim() || null, po_item_id: gv('svcUnit') || null, unit_info: gv('svcUnitInfo').trim() || null, updated_at: new Date().toISOString() };
  if (editId) {
    await sb.from('service_tickets').update(payload).eq('id', editId);
    toast('Tiket diperbarui');
  } else {
    const id = genId('SVC');
    await sb.from('service_tickets').insert({ ...payload, id, status: 'Masuk', created_by: currentUser.id });
    toast('Tiket dibuat: ' + id);
  }
  closeAllModals();
  await loadServices();
}

async function saveSvcLog(ticketId) {
  const tahapan = gv('logTahapan'), catatan = gv('logCatatan').trim(), hasil = gv('logHasil').trim();
  if (!tahapan) { toast('Pilih tahapan'); return; }
  const isResolved = document.getElementById('logResolved').checked;
  await sb.from('service_logs').insert({ ticket_id: ticketId, tahapan, catatan: catatan || null, hasil: hasil || null, is_resolved: isResolved, user_id: currentUser.id });
  // Update ticket to Proses if still Masuk
  const ticket = allServices.find(s => s.id === ticketId);
  if (ticket?.status === 'Masuk') await sb.from('service_tickets').update({ status: 'Proses', updated_at: new Date().toISOString() }).eq('id', ticketId);
  toast('Log ditambahkan');
  await loadServices();
  openSvcDetail(ticketId);
}

async function uploadSvcDoc(ticketId, type, input) {
  for (const f of Array.from(input.files)) {
    const path = `${ticketId}/${type}/${Date.now()}_${f.name}`;
    const { error } = await sb.storage.from('service-docs').upload(path, f);
    if (!error) { await sb.from('service_docs').insert({ ticket_id: ticketId, file_name: f.name, file_path: path, file_size: f.size, file_type: type, uploaded_by: currentUser.id }); toast(f.name + ' diupload'); }
    else toast('Gagal: ' + f.name);
  }
  input.value = '';
  await loadServices();
  openSvcDetail(ticketId);
}

async function deleteSvcDoc(docId, filePath, fileName) {
  if (!confirm('Hapus "' + fileName + '"?')) return;
  await sb.storage.from('service-docs').remove([filePath]);
  await sb.from('service_docs').delete().eq('id', docId);
  toast('Dihapus');
  const ticketId = filePath.split('/')[0];
  await loadServices();
  openSvcDetail(ticketId);
}

async function deleteSvcTicket(id) {
  if (!confirm('Hapus tiket ini beserta semua log dan dokumen?')) return;
  const s = allServices.find(x => x.id === id);
  const docs = s?.service_docs || [];
  if (docs.length) await sb.storage.from('service-docs').remove(docs.map(d => d.file_path));
  await sb.from('service_tickets').delete().eq('id', id);
  closeAllModals();
  toast('Tiket dihapus');
  await loadServices();
}

async function saveUser(editId) {
  const username = gv('ufUsername').trim(), fullName = gv('ufFullName').trim(), role = gv('ufRole'), pw = gv('ufPassword');
  if (!username || !fullName || !role) { toast('Lengkapi field wajib'); return; }
  if (!editId && !pw) { toast('Password wajib untuk user baru'); return; }

  // Collect custom permissions (only for non-fixed roles)
  const isFixed = ['owner','admin','sales','direktur'].includes(role);
  let permissions = {};
  if(!isFixed) {
    document.querySelectorAll('.modCb:checked').forEach(cb => {

  const payload = { username, full_name: fullName, role, is_active: document.getElementById('ufActive').checked, permissions };

  if (editId) {

    payload.id = 'usr-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 5);

  }
  toast(editId ? 'User diperbarui' : 'User baru dibuat');

const SPEC_CATEGORIES = Object.keys(SPEC_FIELDS);
const MONTH_CODES = ['A','B','C','D','E','F','G','H','I','J','K','L'];
function yearCode(y){ return String.fromCharCode(65 + (y - 2025)); }
function monthCode(m){ return MONTH_CODES[m-1]||'A'; }
function voltageCode(v){ const map={'24':'24','48':'48','110':'11','220':'22','380':'38','400':'40'}; return map[String(v)]||String(v).slice(0,2); }
function ratingCode(r){ const n=parseFloat(r)||0; if(n<10) return String(Math.round(n*10)).padStart(2,'0'); return String(Math.round(n)).padStart(2,'0').slice(-2); }

function buildSerialNumberFromSpec(spec, noProject, huruf, angka, prodDate){
  const y=yearCode(prodDate.getFullYear());
  const m=monthCode(prodDate.getMonth()+1);
  const proj=(noProject||'').replace(/[^0-9]/g,'').slice(-3).padStart(3,'0');
  const angkaStr=String(angka).padStart(3,'0');
  const cat=spec.kategori;
  if(cat==='Rectifier'){
    const fase=spec.input_fase||'1';
    const pulse=(spec.pulse||'6').padStart(2,'0');
    const vout=voltageCode(spec.output_voltage||'');
    const rout=ratingCode(spec.output_current||'');
    return 'R'+y+m+fase+pulse+vout+rout+proj+huruf+angkaStr;
  } else if(cat==='UPS'){
    const fase=spec.input_fase||'1';
    const vout=voltageCode(spec.output_voltage||'');
    const rout=ratingCode(spec.output_kva||'');
    return 'U'+y+m+fase+'06'+vout+rout+proj+huruf+angkaStr;
  } else if(cat==='Inverter'){
    const dcin=voltageCode(spec.dc_input_voltage||'');
    const vout=voltageCode(spec.output_voltage||'');
    const rout=ratingCode(spec.output_kva||'');
    return 'I'+y+m+dcin+vout+rout+proj+huruf+angkaStr;
  } else if(cat==='Panel DCDB'||cat==='DCDB'){
    return 'D'+y+m+proj+huruf+angkaStr;
  } else if(cat==='Panel ACDB'||cat==='ACDB'){
    return 'A'+y+m+proj+huruf+angkaStr;
  }
  return null;
}

function renderSpecForm(category, values){
  const fields = SPEC_FIELDS[category];
  if(!fields) return '<div style="color:var(--text3);font-size:13px">Spec tidak tersedia untuk kategori ini.</div>';
  let html = '<div class="form-grid">';
  fields.forEach(f=>{
    const val = values[f.id]||'';
    if(f.type==='select'){
      const opts = f.options.map(o=>'<option value="'+o+'"'+(val==o?' selected':'')+'>'+o+'</option>').join('');
      html += '<div class="form-row"><label>'+f.label+'</label><select id="spec_'+f.id+'" style="width:100%;padding:6px 8px">'+opts+'</select></div>';
    } else if(f.type==='textarea'){
      html += '<div class="form-row" style="grid-column:1/-1"><label>'+f.label+'</label><textarea id="spec_'+f.id+'" placeholder="'+(f.placeholder||'')+'" rows="2">'+val+'</textarea></div>';
    } else {
      html += '<div class="form-row"><label>'+f.label+'</label><input type="text" id="spec_'+f.id+'" value="'+val+'" placeholder="'+(f.placeholder||'')+'"></div>';
    }
  });
  html += '</div>';
  return html;
}

function buildModelName(cat, spec){
  const v=f=>spec[f]||'';
  if(cat==='Rectifier') return 'S-Pro'+(v('input_fase')||'1')+' '+(v('output_voltage')||'')+(v('output_current')?'-'+v('output_current')+'A':'');
  if(cat==='UPS'){ const kva=v('output_kva'); return 'A-Pro'+(v('input_fase')||'3')+'/'+(v('output_fase')||'1')+' '+(kva?kva+'K':''); }
  if(cat==='Inverter'){ const kva=v('output_kva'); return 'INV '+(kva?kva+'K':''); }
  if(cat==='Panel ACDB') return 'ACDB '+(v('input_voltage')||'')+'V-'+(v('output_current')||'')+'A';
  if(cat==='Panel DCDB') return 'DCDB '+(v('input_voltage')||'')+'V-'+(v('output_current')||'')+'A';
  return '';
}

// ─── IMPORT / EXPORT EXCEL ──────────────────────────────────
function downloadBOMImportTemplate() {
  if (typeof XLSX === 'undefined') { toast('SheetJS belum dimuat, refresh halaman'); return; }
  const wb = XLSX.utils.book_new();

  const wsComp = XLSX.utils.aoa_to_sheet([
    ['part_number', 'name', 'category', 'unit', 'price', 'supplier'],
    ['BRK-100A', 'MCB 100A 3P', 'Breaker', 'pcs', 850000, 'ABB'],
    ['CAP-470UF', 'Capacitor 470uF 450V', 'Capacitor', 'pcs', 125000, 'Nichicon'],
    ['TRF-10KVA', 'Transformer 10kVA Isolasi', 'Transformer', 'pcs', 12500000, 'Trafindo'],
  ]);
  XLSX.utils.book_append_sheet(wb, wsComp, 'Components');

  const wsTmpl = XLSX.utils.aoa_to_sheet([
    ['template_name', 'unit_category', 'part_number', 'qty', 'note'],
    ['UPS 10kVA Standard', 'UPS', 'BRK-100A', 2, 'Input MCB'],
    ['UPS 10kVA Standard', 'UPS', 'CAP-470UF', 6, 'DC Bus'],
    ['UPS 10kVA Standard', 'UPS', 'TRF-10KVA', 1, 'Isolation Transformer'],
    ['Rectifier 100A', 'Rectifier', 'BRK-100A', 1, 'Output MCB'],
  ]);
  XLSX.utils.book_append_sheet(wb, wsTmpl, 'Templates');

  XLSX.writeFile(wb, 'BOM_Import_Template.xlsx');
  toast('Template diunduh');
}

async function handleBOMImport(input) {
  const file = input.files[0];
  if (!file) return;
  if (typeof XLSX === 'undefined') { toast('SheetJS belum dimuat, refresh halaman'); return; }
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });

    let newComps = 0, updatedComps = 0, skippedComps = 0;
    let newTmpls = 0, newTmplItems = 0;

    // Process Components sheet
    if (wb.SheetNames.includes('Components')) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets['Components']);
      for (const r of rows) {
        const pn = String(r.part_number || '').trim();
        const name = String(r.name || '').trim();
        if (!pn || !name) { skippedComps++; continue; }
        const payload = {
          part_number: pn, name,
          category: r.category ? String(r.category).trim() : null,
          unit: r.unit ? String(r.unit).trim() : 'pcs',
          price: parseFloat(r.price) || 0,
          supplier: r.supplier ? String(r.supplier).trim() : null,
          updated_at: new Date().toISOString()
        };
        // Upsert by part_number
        const existing = bomState.components.find(c => c.part_number === pn);
        if (existing) {
          await sb.from('bom_components').update(payload).eq('id', existing.id);
          updatedComps++;
        } else {
          await sb.from('bom_components').insert({ ...payload, created_by: currentUser.id });
          newComps++;
        }
      }
    }

    // Reload components for template lookup
    const { data: freshComps } = await sb.from('bom_components').select('*');
    const compByPN = {};
    (freshComps || []).forEach(c => { compByPN[c.part_number] = c; });

    // Process Templates sheet
    if (wb.SheetNames.includes('Templates')) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets['Templates']);
      const grouped = {};
      for (const r of rows) {
        const tn = String(r.template_name || '').trim();
        const cat = String(r.unit_category || '').trim();
        if (!tn || !cat) continue;
        const key = `${tn}||${cat}`;
        (grouped[key] = grouped[key] || { name: tn, unit_category: cat, items: [] }).items.push(r);
      }
      for (const key of Object.keys(grouped)) {
        const g = grouped[key];
        // Check if template exists
        const { data: existing } = await sb.from('bom_templates').select('*').eq('name', g.name).eq('unit_category', g.unit_category).maybeSingle();
        let tmplId;
        if (existing) {
          tmplId = existing.id;
        } else {
          const { data: ins } = await sb.from('bom_templates').insert({
            name: g.name, unit_category: g.unit_category,
            created_by: currentUser.id
          }).select().single();
          tmplId = ins.id;
          newTmpls++;
        }
        // Insert items
        for (const it of g.items) {
          const pn = String(it.part_number || '').trim();
          const c = compByPN[pn];
          await sb.from('bom_template_items').insert({
            template_id: tmplId,
            component_id: c?.id || null,
            part_number: pn || null,
            name: c?.name || pn || 'Unknown',
            unit: c?.unit || 'pcs',
            qty: parseFloat(it.qty) || 1,
            note: it.note ? String(it.note).trim() : null
          });
          newTmplItems++;
        }
      }
    }

    toast(`Import: ${newComps} komponen baru, ${updatedComps} update, ${newTmpls} template baru, ${newTmplItems} item template`);
    input.value = '';
    await loadBOMData();
    renderBOMTab();
  } catch (e) {
    console.error(e);
    toast('Error import: ' + e.message);
  }
}

// ─── BOM BUILDER (Create / Edit BOM) ─────────────────────────
function openBOMForm(opts) {
  // opts: { ppRequestId, poId, poItemId, poItemLabel } untuk shortcut dari PP/PO
  opts = opts || {};
  if (!can('bom_manage')) return;
  openModal(`<div class="modal modal-sm">
    <div class="modal-header"><h2>BOM Baru</h2><button class="btn btn-ghost btn-sm" onclick="closeAllModals()">&#x2715;</button></div>
    <div class="modal-body">
      <div class="form-row"><label>Title BOM <span class="req">*</span></label><input type="text" id="bomTitle" placeholder="Contoh: BOM UPS 10kVA - PT ABC"></div>
      <div class="form-row"><label>Kategori Unit <span class="req">*</span></label>
        <select id="bomCategory" onchange="onBOMCategoryChange()">
          <option value="">-- Pilih --</option>
          ${BOM_UNIT_CATEGORIES.map(c => `<option>${c}</option>`).join('')}
        </select>
      </div>
      <div class="form-row" id="bomTemplateRow" style="display:none">
        <label>Generate dari Template (opsional)</label>
        <select id="bomTemplate"><option value="">-- Mulai dari kosong --</option></select>
      </div>
      <div class="form-row"><label>Deskripsi</label><textarea id="bomDesc"></textarea></div>
      ${opts.ppRequestId ? `<div style="font-size:12px;color:var(--text3);background:var(--surface2);padding:8px;border-radius:6px">📎 Akan ter-link ke PP: <strong>${opts.ppRequestId}</strong></div>` : ''}
      ${opts.poItemId ? `<div style="font-size:12px;color:var(--text3);background:var(--surface2);padding:8px;border-radius:6px">📎 Akan ter-link ke PO Item: <strong>${opts.poItemLabel || opts.poItemId}</strong></div>` : ''}
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAllModals()">Batal</button>
      <button class="btn btn-primary" onclick='createBOM(${JSON.stringify(opts)})'>Buat & Edit</button>
    </div>
  </div>`);
}

function onBOMCategoryChange() {
  const cat = gv('bomCategory');
  const row = document.getElementById('bomTemplateRow');
  const sel = document.getElementById('bomTemplate');
  if (!cat) { row.style.display = 'none'; return; }
  const tmpls = bomState.templates.filter(t => t.unit_category === cat);
  if (!tmpls.length) { row.style.display = 'none'; return; }
  row.style.display = 'block';
  sel.innerHTML = '<option value="">-- Mulai dari kosong --</option>' + tmpls.map(t => `<option value="${t.id}">${t.name} (${(t.bom_template_items || []).length} komponen)</option>`).join('');
}

async function createBOM(opts) {
  opts = opts || {};
  const title = gv('bomTitle').trim(), cat = gv('bomCategory'), tmplId = gv('bomTemplate');
  if (!title || !cat) { toast('Title dan Kategori wajib'); return; }
  const id = genId('BOM');
  const payload = {
    id, title, unit_category: cat,
    description: gv('bomDesc').trim() || null,
    pp_request_id: opts.ppRequestId || null,
    po_id: opts.poId || null,
    po_item_id: opts.poItemId || null,
    status: 'Draft',
    created_by: currentUser.id
  };
  await sb.from('bom_lists').insert(payload);
  await logBOM(id, 'Buat BOM', `${title} — ${cat}`);

  // If template selected, copy items
  if (tmplId) {
    const tmpl = bomState.templates.find(t => t.id == tmplId);
    if (tmpl) {
      for (const ti of (tmpl.bom_template_items || [])) {
        const comp = ti.component_id ? bomState.components.find(c => c.id === ti.component_id) : null;
        await sb.from('bom_items').insert({
          bom_id: id,
          component_id: ti.component_id || null,
          part_number: ti.part_number || comp?.part_number || null,
          name: ti.name || comp?.name || 'Unknown',
          unit: ti.unit || comp?.unit || 'pcs',
          qty: ti.qty || 1,
          unit_price: comp?.price || 0,
          note: ti.note || null,
          sort_order: ti.sort_order || 0
        });
      }
      await logBOM(id, 'Generate dari Template', tmpl.name);
    }
  }
  await recalcBOMTotal(id);

  toast('BOM dibuat: ' + id);
  closeAllModals();
  await loadBOMData();
  openBOMDetail(id);
}

  openModal(`<div class="modal" style="max-width:1100px">
    <div class="modal-header">
      <div>
        <h2>${data.title}</h2>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">
          ${data.id} · ${data.unit_category} · ${badge(data.status)} · oleh ${data.app_users?.full_name || '—'} · ${fmtDate(data.created_at)}
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeAllModals()">&#x2715;</button>
    </div>
    <div class="modal-body">
      ${data.description ? `<div class="desc-box" style="margin-bottom:1rem">${data.description}</div>` : ''}
      ${(data.pp_request_id || data.po_id) ? `<div style="font-size:12px;background:var(--surface2);padding:8px;border-radius:6px;margin-bottom:1rem">
        ${data.pp_request_id ? `🔗 PP Request: <strong>${data.pp_request_id}</strong> ` : ''}
        ${data.po_id ? `🔗 PO: <strong>${data.po_id}</strong>` : ''}
      </div>` : ''}

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px">
        <div class="sect-title" style="margin-bottom:0">Komponen (${items.length})</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${canManage ? `<button class="btn btn-sm" onclick="openBOMAddItem('${data.id}')">+ Tambah Komponen</button>` : ''}
          <button class="btn btn-sm btn-ghost" onclick="exportBOMExcel('${data.id}', true)">📊 Export Excel (+harga)</button>
          <button class="btn btn-sm btn-ghost" onclick="exportBOMExcel('${data.id}', false)">📊 Export Excel (no harga)</button>
          <button class="btn btn-sm btn-ghost" onclick="exportBOMPrint('${data.id}', true)">🖨 Print (+harga)</button>
          <button class="btn btn-sm btn-ghost" onclick="exportBOMPrint('${data.id}', false)">🖨 Print (no harga)</button>
        </div>
      </div>

      ${items.length ? `<div class="table-card"><div class="table-wrap"><table>
        <thead><tr>
          <th style="width:40px">#</th>
          <th>Part Number</th>
          <th>Nama</th>
          <th style="width:80px">Qty</th>
          <th style="width:60px">Unit</th>
          ${showPrice ? '<th style="width:140px">Harga Satuan</th><th style="width:140px">Subtotal</th>' : ''}
          <th>Note</th>
          ${canManage ? '<th style="width:80px"></th>' : ''}
        </tr></thead>
        <tbody>${items.map((it, idx) => `
          <tr>
            <td style="color:var(--text3)">${idx + 1}</td>
            <td class="mono">${it.part_number || '—'}</td>
            <td style="font-weight:500">${it.name}</td>
            <td>${it.qty}</td>
            <td>${it.unit}</td>
            ${showPrice ? `<td>${fmtRp(it.unit_price)}</td><td><strong>${fmtRp(it.qty * it.unit_price)}</strong></td>` : ''}
            <td style="font-size:12px;color:var(--text2)">${it.note || '—'}</td>
            ${canManage ? `<td>
              <button class="btn btn-sm" onclick="openBOMEditItem(${it.id}, '${data.id}')">✎</button>
              <button class="btn btn-sm btn-ghost" onclick="deleteBOMItem(${it.id}, '${data.id}')">✕</button>

    <div class="modal-body">

        <div class="form-row"><label>Part Number</label><input type="text" id="biPN"></div>

function onBOMItemCompSelect(compId) {
  if (!compId) return;
  const c = bomState.components.find(x => x.id == compId);
  if (!c) return;
  sv('biPN', c.part_number || '');
  sv('biName', c.name);
  sv('biUnit', c.unit || 'pcs');
  sv('biPrice', c.price || 0);
}

async function openBOMEditItem(itemId, bomId) {
  const { data: it } = await sb.from('bom_items').select('*').eq('id', itemId).single();
  if (!it) return;
  openModal(`<div class="modal modal-sm">
    <div class="modal-header"><h2>Edit Komponen</h2><button class="btn btn-ghost btn-sm" onclick="closeAllModals()">&#x2715;</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-row"><label>Part Number</label><input type="text" id="biPN" value="${(it.part_number || '').replace(/"/g, '&quot;')}"></div>
        <div class="form-row"><label>Nama Komponen <span class="req">*</span></label><input type="text" id="biName" value="${(it.name || '').replace(/"/g, '&quot;')}"></div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label>Qty <span class="req">*</span></label><input type="number" step="0.001" id="biQty" value="${it.qty}"></div>
        <div class="form-row"><label>Unit</label><input type="text" id="biUnit" value="${it.unit || 'pcs'}"></div>
      </div>
      <div class="form-row"><label>Harga Satuan (Rp)</label><input type="number" step="0.01" id="biPrice" value="${it.unit_price}"></div>
      <div class="form-row"><label>Note</label><input type="text" id="biNote" value="${(it.note || '').replace(/"/g, '&quot;')}"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAllModals()">Batal</button>
      <button class="btn btn-primary" onclick="saveBOMItem('${bomId}', ${itemId})">Simpan</button>
    </div>
  </div>`);
}

async function saveBOMItem(bomId, itemId) {
  const name = gv('biName').trim();
  const qty = parseFloat(gv('biQty')) || 0;
  if (!name || qty <= 0) { toast('Nama dan Qty wajib (Qty > 0)'); return; }
  const payload = {
    part_number: gv('biPN').trim() || null,
    name,
    unit: gv('biUnit').trim() || 'pcs',
    qty,
    unit_price: parseFloat(gv('biPrice')) || 0,
    note: gv('biNote').trim() || null
  };
  if (itemId) {
    await sb.from('bom_items').update(payload).eq('id', itemId);
    await logBOM(bomId, 'Edit Item', `${payload.name} qty=${payload.qty}`);
  } else {
    payload.bom_id = bomId;
    payload.component_id = gv('biComp') ? parseInt(gv('biComp')) : null;
    await sb.from('bom_items').insert(payload);
    await logBOM(bomId, 'Tambah Item', `${payload.name} qty=${payload.qty}`);
  }
  await recalcBOMTotal(bomId);
  toast(itemId ? 'Item diperbarui' : 'Item ditambahkan');
  closeAllModals();
  await loadBOMData();
  openBOMDetail(bomId);
}

async function deleteBOMItem(itemId, bomId) {
  if (!confirm('Hapus komponen ini dari BOM?')) return;
  const { data: it } = await sb.from('bom_items').select('name').eq('id', itemId).single();
  await sb.from('bom_items').delete().eq('id', itemId);
  await logBOM(bomId, 'Hapus Item', it?.name || '');
  await recalcBOMTotal(bomId);
  toast('Item dihapus');
  await loadBOMData();
  openBOMDetail(bomId);
}

async function recalcBOMTotal(bomId) {
  const { data: items } = await sb.from('bom_items').select('qty,unit_price').eq('bom_id', bomId);
  const total = (items || []).reduce((s, it) => s + (it.qty * it.unit_price || 0), 0);
  await sb.from('bom_lists').update({ total_price: total, updated_at: new Date().toISOString() }).eq('id', bomId);
}

async function updateBOMStatus(bomId, status) {
  await sb.from('bom_lists').update({ status, updated_at: new Date().toISOString() }).eq('id', bomId);
  await logBOM(bomId, 'Update Status', '→ ' + status);
  toast('Status → ' + status);
  await loadBOMData();
  openBOMDetail(bomId);
}

async function deleteBOM(bomId) {
  if (!confirm('Hapus BOM ini beserta semua itemnya?')) return;
  await sb.from('bom_lists').delete().eq('id', bomId);
  toast('BOM dihapus');
  closeAllModals();
  await loadBOMData();
  renderBOMTab();
}

// ─── EXPORT ─────────────────────────────────────────────────
async function exportBOMExcel(bomId, withPrice) {
  if (typeof XLSX === 'undefined') { toast('SheetJS belum dimuat'); return; }
  const { data: bom } = await sb.from('bom_lists').select('*,bom_items(*)').eq('id', bomId).single();
  if (!bom) return;
  const items = (bom.bom_items || []).sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));

  const rows = [
    ['BILL OF MATERIALS'],
    [],
    ['BOM ID', bom.id],
    ['Title', bom.title],
    ['Kategori', bom.unit_category || ''],
    ['Status', bom.status],
    ['Tanggal', fmtDate(bom.created_at)],
    bom.pp_request_id ? ['PP Request', bom.pp_request_id] : null,
    bom.po_id ? ['PO', bom.po_id] : null,
    bom.description ? ['Deskripsi', bom.description] : null,
    [],
    withPrice
      ? ['No', 'Part Number', 'Nama Komponen', 'Qty', 'Unit', 'Harga Satuan', 'Subtotal', 'Note']
      : ['No', 'Part Number', 'Nama Komponen', 'Qty', 'Unit', 'Note']
  ].filter(Boolean);

  let total = 0;
  items.forEach((it, i) => {
    const sub = it.qty * it.unit_price;
    total += sub;
    if (withPrice) {
      rows.push([i + 1, it.part_number || '', it.name, it.qty, it.unit, it.unit_price, sub, it.note || '']);
    } else {
      rows.push([i + 1, it.part_number || '', it.name, it.qty, it.unit, it.note || '']);
    }
  });

  if (withPrice) {
    rows.push([]);
    rows.push(['', '', '', '', '', 'TOTAL', total, '']);
  }

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = withPrice
    ? [{ wch: 5 }, { wch: 18 }, { wch: 40 }, { wch: 8 }, { wch: 8 }, { wch: 15 }, { wch: 15 }, { wch: 25 }]
    : [{ wch: 5 }, { wch: 18 }, { wch: 40 }, { wch: 8 }, { wch: 8 }, { wch: 25 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'BOM');
  XLSX.writeFile(wb, `${bom.id}_${bom.title.replace(/[^a-zA-Z0-9]/g, '_')}.xlsx`);
  toast('Excel diunduh');
}
