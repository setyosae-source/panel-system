async function savePO(editId) {
  const btn = document.getElementById('btnSavePO');
  btn.disabled = true; btn.textContent = 'Menyimpan...';
  try {
    const payload = {
      no_po: gv('pfNoPO').trim(), tgl_po: gv('pfTglPO'), customer_name: gv('pfCustomer').trim(),
      project_name: gv('pfProject').trim() || null, tgl_target_kirim: gv('pfTglKirim') || null,
      no_project: gv('pfNoProject').trim() || null, nilai_po: gv('pfNilai').replace(/[^0-9.]/g, '') || null,
      has_fat: document.getElementById('pfFAT').checked, has_instalasi: document.getElementById('pfInstalasi').checked,
      has_commissioning: document.getElementById('pfCommissioning').checked,
      pp_request_id: gv('pfLinkedPP') || null, catatan: gv('pfCatatan').trim() || null,
      updated_at: new Date().toISOString()
    };
    let poId;
    if (editId) {
      await sb.from('purchase_orders').update(payload).eq('id', editId);
      poId = editId;
      await logPO(poId, 'Edit PO', 'Data PO diperbarui');
    } else {
      const { data } = await sb.from('purchase_orders').insert({ ...payload, created_by: currentUser.id }).select().single();
      poId = data.id;
      await logPO(poId, 'PO Dibuat', payload.no_po);
    }
    // Save items
    if (!editId) {
      for (const it of poFormItems) {
        if (!it.category) continue;
        await sb.from('po_items').insert({ po_id: poId, category: it.category, model_name: it.model_name || null, spec_summary: it.spec_summary || null, qty: it.qty, is_produksi: it.is_produksi });
      }
    }
    toast(editId ? 'PO diperbarui' : 'PO dibuat');
    closeAllModals();
    await loadPOs();
    if (poId) openPODetail(poId);
  } catch (e) { toast('Error: ' + e.message); }
  btn.disabled = false; btn.textContent = 'Simpan PO';
}

// SPEC FROM PO FORM (Step 2 - before PO saved)
function openItemSpecFromForm(idx){
  const it = poFormItems[idx];
  if(!it) return;
  const cat = it.category;
  _specFormCtx = {idx, category: cat};
  const existing = poFormSpecs[idx]||{};
  const specHtml = '<div class="modal modal-sm">'
    +'<div class="modal-header"><div><h2>Spesifikasi Item</h2><div style="font-size:12px;color:var(--text3);margin-top:2px">'+cat+'</div></div><button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'specModal\').remove()">&#x2715;</button></div>'
    +'<div class="modal-body">'+renderSpecForm(cat, existing)+'</div>'
    +'<div class="modal-footer"><button class="btn" onclick="document.getElementById(\'specModal\').remove()">Batal</button><button class="btn btn-primary" onclick="saveItemSpecFromForm()">Simpan Spec</button></div>'
    +'</div>';
  openModal(specHtml, 'specModal', true);
}

function buildSpecSummary(cat, spec){
  const v=f=>spec[f]||'';
  if(cat==='Rectifier') return (v('input_fase')+'ph, '+v('input_voltage')+'VAC → '+v('output_voltage')+'VDC '+v('output_current')+'A').replace(/\s+/g,' ').trim();
  if(cat==='UPS') return (v('input_fase')+'ph/'+v('output_fase')+'ph, '+v('output_kva')+'kVA, '+v('input_voltage')+'VAC').replace(/\s+/g,' ').trim();
  if(cat==='Inverter') return (v('dc_input_voltage')+'VDC → '+v('output_voltage')+'VAC '+v('output_kva')+'kVA').replace(/\s+/g,' ').trim();
  if(cat==='Panel ACDB') return ('ACDB '+v('input_fase')+'ph '+v('input_voltage')+'VAC '+v('output_current')+'A').replace(/\s+/g,' ').trim();
  if(cat==='Panel DCDB') return ('DCDB '+v('input_voltage')+'VDC '+v('output_current')+'A').replace(/\s+/g,' ').trim();
  return '';
}

function saveItemSpecFromForm(){
  const {idx, category} = _specFormCtx;
  const fields = SPEC_FIELDS[category]||[];
  const data = {kategori: category};
  fields.forEach(f=>{ const el=document.getElementById('spec_'+f.id); if(el) data[f.id]=el.value.trim()||null; });
  poFormSpecs[idx] = data;
  const modelName = buildModelName(category, data);
  if(modelName) poFormItems[idx].model_name = modelName;
  const specSummary = buildSpecSummary(category, data);
  if(specSummary) poFormItems[idx].spec_summary = specSummary;
  toast('Spec disimpan');
  closeModal('specModal');
  renderPOItems();
}

const BRAND_OPTIONS = ['SAEPOWER', 'SAE ENERGY'];
const COLOUR_OPTIONS = ['Powder Coating RAL7035', 'Powder Coating RAL7032'];

const PULSE_OPTIONS = ['2', '6', '12', '24'];

async function openDetailSpecModal(itemId, poId) {
  const po = allPOs.find(x=>x.id===poId);
  const item = po?.po_items?.find(i=>i.id===itemId);
  if(!item) return;

  // Load existing detail spec
  let ds = null; try { const r = await sb.from('item_detail_specs').select('*').eq('item_id', itemId).single(); ds = r.data; } catch(e) { ds = {}; }
  const spec = ds || {};
  const cat = item.category;

  // Load autocomplete data from previous specs
  let prevSpecs = []; try { const r = await sb.from('item_detail_specs').select('*').limit(50); prevSpecs = r.data || []; } catch(e) { prevSpecs = []; }
  const prev = prevSpecs || [];

  // Build autocomplete suggestions per field
  const suggestions = {};
  const acFields = ['r_input_voltage','r_output_voltage','r_output_current','r_voltage_adjustable',
    'u_rect_input_voltage','u_dc_bus_voltage','u_dc_bus_current','u_inv_output_voltage',
    'u_capacity_kva','u_capacity_kw','i_capacity_kva','i_capacity_kw',
    'i_input_voltage','i_output_voltage','i_topology',
    'p_input_voltage','p_current_rating','p_feeder_count','p_feeder_rating','custom_notes'];
  acFields.forEach(f => {
    suggestions[f] = [...new Set(prev.map(p=>p[f]).filter(Boolean))];
  });

  window._dsItemId = itemId;
  window._dsSuggestions = suggestions;

  function sel(id, opts, val, placeholder='') {
    return '<select id="ds_'+id+'" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r-sm)">'
      + (placeholder?'<option value="">'+placeholder+'</option>':'')
      + opts.map(o=>'<option value="'+o+'"'+(val===o?' selected':'')+'>'+o+'</option>').join('')
      + '</select>';
  }

  function inp(id, val, placeholder='', unit='') {
    const sugg = (suggestions[id]||[]);
    const listId = 'list_'+id;
    if(unit) {
      let html = '<div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden">'
        + '<input type="text" id="ds_'+id+'" value="'+(val||'')+'" placeholder="'+placeholder+'" '
        + 'style="flex:1;padding:6px 8px;border:none;outline:none;background:transparent" '
        + (sugg.length?'list="'+listId+'"':'') + '>'
        + '<span style="padding:6px 10px;background:var(--surface2);color:var(--text2);font-size:13px;border-left:1px solid var(--border)">'+unit+'</span>'
        + '</div>';
      if(sugg.length) html += '<datalist id="'+listId+'">'+sugg.map(s=>'<option value="'+s+'">').join('')+'</datalist>';
      return html;
    }
    let html = '<input type="text" id="ds_'+id+'" value="'+(val||'')+'" placeholder="'+placeholder+'" '
      + 'style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r-sm)" '
      + (sugg.length?'list="'+listId+'"':'') + '>';
    if(sugg.length) html += '<datalist id="'+listId+'">'+sugg.map(s=>'<option value="'+s+'">').join('')+'</datalist>';
    return html;
  }

  function row(label, inputHtml) {
    return '<div class="form-row" style="margin-bottom:8px"><label style="font-size:12px;color:var(--text2);margin-bottom:4px;display:block">'+label+'</label>'+inputHtml+'</div>';
  }

  function section(title, html) {
    return '<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px">'
      + '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px">'+title+'</div>'
      + html + '</div>';
  }

  // Common fields
  let commonHtml = '<div class="form-grid">'
    + row('Brand', sel('brand', BRAND_OPTIONS, spec.brand||'SAEPOWER'))
    + row('IP Protection', sel('ip_protection', IP_OPTIONS, spec.ip_protection||'IP 23'))
    + row('Colour', sel('colour', COLOUR_OPTIONS, spec.colour||'Powder Coating RAL7035'))
    + row('Cable Entry', sel('cable_entry', CABLE_OPTIONS, spec.cable_entry||''))
    + '</div>';

  // Category specific
  let catHtml = '';
  if(cat === 'Rectifier') {
    catHtml = section('INPUT', '<div class="form-grid">'
      + row('Parallel Input', '<label style="display:flex;align-items:center;gap:8px;margin-top:4px"><input type="checkbox" id="ds_r_parallel_input"'+(spec.r_parallel_input?' checked':'')+'>  <span style="font-size:13px">2 Input (Parallel System)</span></label>')
      + row('Input Voltage', inp('r_input_voltage', spec.r_input_voltage, '220 / 380', 'VAC'))
      + row('Input Phase', sel('r_input_phase', PHASE_OPTIONS, spec.r_input_phase||'1 Phase'))
      + row('Pulse', sel('r_pulse', PULSE_OPTIONS, spec.r_pulse||'6'))
      + '</div>')
    + section('OUTPUT', '<div class="form-grid">'
      + row('Output Voltage', inp('r_output_voltage', spec.r_output_voltage, '110', 'VDC'))
      + row('Output Current', inp('r_output_current', spec.r_output_current, '10', 'A'))
      + row('Voltage Adjustable', inp('r_voltage_adjustable', spec.r_voltage_adjustable, '100~160 via front panel', 'VDC'))
      + '</div>');
  } else if(cat === 'UPS') {

function dsRenderFiles(spec) {
  ['photos','doc_drawing_approval','doc_asbuilt','doc_fat'].forEach(key => {
    const el = document.getElementById('ds_'+key+'_list');
    if(!el) return;
    const files = spec[key] || [];
    el.innerHTML = files.length
      ? files.map((f,i)=>'<div style="font-size:11px;padding:3px 0;display:flex;align-items:center;gap:6px"><a href="'+f.url+'" target="_blank" style="color:var(--blue);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+f.name+'</a></div>').join('')
      : '<div style="font-size:11px;color:var(--text3);margin-bottom:4px">Belum ada</div>';
  });
}

function dsUpload(field, itemId) {
  document.getElementById('ds_'+field+'_input').click();
}

async function dsHandleUpload(field, itemId, input) {
  const files = Array.from(input.files);
  let existing = {}; try { const r = await sb.from('item_detail_specs').select(field).eq('item_id', itemId).single(); existing = r.data||{}; } catch(e) {}
  const arr = existing?.[field] || [];
  for(const f of files) {
    const path = 'item-docs/'+itemId+'/'+field+'/'+Date.now()+'_'+f.name;
    const {error} = await sb.storage.from('item-docs').upload(path, f);
    if(!error) {
      const url = SB_URL+'/storage/v1/object/public/item-docs/'+path;
      arr.push({name: f.name, url, path});
      toast(f.name+' diupload');
    } else toast('Gagal: '+f.name);
  }
  const update = {};
  update[field] = arr;
  await sb.from('item_detail_specs').upsert({item_id: itemId, ...update}, {onConflict:'item_id'});
  input.value = '';
  try { const r = await sb.from('item_detail_specs').select('*').eq('item_id',itemId).single(); dsRenderFiles(r.data||{}); } catch(e) { dsRenderFiles({}); }
}

function gvds(id) {
  const el = document.getElementById('ds_'+id);
  return el ? el.value.trim() : null;
}

async function saveDetailSpec(itemId, poId) {
  const po = allPOs.find(x=>x.id===poId);
  const item = po?.po_items?.find(i=>i.id===itemId);
  const cat = item?.category;

  const data = {
    item_id: itemId,
    brand: gvds('brand'),
    ip_protection: gvds('ip_protection'),
    colour: gvds('colour'),
    cable_entry: gvds('cable_entry'),
    custom_notes: gvds('custom_notes'),
    updated_at: new Date().toISOString()
  };

  if(cat === 'Rectifier') {
    Object.assign(data, {
      r_parallel_input: document.getElementById('ds_r_parallel_input')?.checked || false,
      r_input_voltage: gvds('r_input_voltage'),
      r_input_phase: gvds('r_input_phase'),
      r_pulse: gvds('r_pulse'),
      r_output_voltage: gvds('r_output_voltage'),
      r_output_current: gvds('r_output_current'),
      r_voltage_adjustable: gvds('r_voltage_adjustable'),
    });
    // Auto power factor based on pulse
    const pulse = parseInt(data.r_pulse||'6');
    data.r_power_factor = pulse >= 12 ? '>0.9' : pulse === 6 ? '>0.8' : '>0.7';
  } else if(cat === 'UPS') {
    Object.assign(data, {
      u_capacity_kva: gvds('u_capacity_kva'),
      u_capacity_kw: gvds('u_capacity_kw'),
      u_rect_input_voltage: gvds('u_rect_input_voltage'),
      u_rect_input_phase: gvds('u_rect_input_phase'),
      u_dc_bus_voltage: gvds('u_dc_bus_voltage'),
      u_dc_bus_current: gvds('u_dc_bus_current'),
      u_inv_output_voltage: gvds('u_inv_output_voltage'),
      u_inv_output_phase: gvds('u_inv_output_phase'),
      u_bypass_voltage: gvds('u_bypass_voltage'),
    });
  } else if(cat === 'Inverter') {
    Object.assign(data, {
      i_capacity_kva: gvds('i_capacity_kva'),
      i_capacity_kw: gvds('i_capacity_kw'),
      i_input_voltage: gvds('i_input_voltage'),
      i_input_tolerance: gvds('i_input_tolerance'),
      i_output_voltage: gvds('i_output_voltage'),
      i_output_phase: gvds('i_output_phase'),
      i_topology: gvds('i_topology'),
    });
  } else if(cat === 'Panel ACDB' || cat === 'Panel DCDB') {
    Object.assign(data, {
      p_input_voltage: gvds('p_input_voltage'),
      p_input_phase: gvds('p_input_phase'),
      p_current_rating: gvds('p_current_rating'),
      p_feeder_count: gvds('p_feeder_count'),
      p_feeder_rating: gvds('p_feeder_rating'),
    });
  }

  const {error} = await sb.from('item_detail_specs').upsert(data, {onConflict:'item_id'});
  if(error) { toast('Error: '+error.message); return; }
  toast('Detail spec disimpan');
  closeAllModals();
  await loadPOs();
  openPODetail(poId);
}

async function doGenerateSerials(poId) {
  const prodDate = gv('snProdDate');
  if (!prodDate) { toast('Pilih tanggal produksi'); return; }
  const p = allPOs.find(x => x.id === poId);
  const items = (p?.po_items || []).filter(it => it.is_produksi && SPEC_CATEGORIES.includes(it.category) && !it.serial_number);
  const dateObj = new Date(prodDate);
  let generated = 0, skipped = 0;
  for (const it of items) {
    let spec = null; try { const _r = await sb.from('item_specs').select('*').eq('item_id', it.id).single(); spec = _r.data; } catch(e) {}
    if (!spec) { skipped++; continue; }
    const { data: counter } = await sb.from('serial_counter').select('*').eq('id', 1).single();
    let { huruf, angka } = counter;
    const sn = buildSerialNumberFromSpec(spec, p.no_project, huruf, angka, dateObj);
    if (!sn) { skipped++; continue; }
    angka++;
    if (angka > 999) { angka = 1; huruf = String.fromCharCode(huruf.charCodeAt(0) + 1); }
    await sb.from('serial_counter').update({ huruf, angka }).eq('id', 1);
    await sb.from('po_items').update({ serial_number: sn, serial_generated_at: new Date().toISOString() }).eq('id', it.id);
    generated++;
  }
  await logPO(poId, 'Generate Serial', generated + ' item' + (skipped ? ', ' + skipped + ' item skip (belum ada spec)' : ''));
  toast(generated + ' SN di-generate' + (skipped ? ', ' + skipped + ' skip (isi spec dulu)' : ''));
  closeAllModals();
  await loadPOs();
  openPODetail(poId);
}

async function loadDownloadFilesPO(poId){
  const po = allPOs.find(x=>x.id===poId);
  const files = po?.download_files || [];
  const el = document.getElementById('dlFileListPO_'+poId);
  if(!el) return;
  el.innerHTML = files.length ? files.map((f,i)=>`
    <div class="file-item">
      <span class="fname" style="cursor:default;text-decoration:none;color:var(--text)">${f.name}</span>
      <div class="file-actions" style="opacity:1">
        <button class="file-act-btn del" data-pid="${poId}" data-idx="${i}" onclick="removeDownloadFilePO(this.dataset.pid,parseInt(this.dataset.idx))">🗑</button>
      </div>
    </div>`).join('') : '<div style="font-size:12px;color:var(--text3)">Belum ada file</div>';
}

async function uploadDownloadFilePO(poId, input){
  const files = Array.from(input.files);
  const {data:po} = await sb.from('purchase_orders').select('download_files').eq('id',poId).single();
  const existing = po?.download_files || [];
  for(const f of files){
    const path = 'downloads/po/'+poId+'/'+Date.now()+'_'+f.name;
    const {error} = await sb.storage.from('po-docs').upload(path, f);
    if(!error){
      const url = SB_URL+'/storage/v1/object/public/po-docs/'+path;
      existing.push({name:f.name, url, path});
      toast(f.name+' diupload');
    } else toast('Gagal: '+f.name);
  }
  await sb.from('purchase_orders').update({download_files: existing}).eq('id',poId);
  input.value='';
  await loadPOs();
  loadDownloadFilesPO(poId);
}

async function removeDownloadFilePO(poId, idx){
  const {data:po} = await sb.from('purchase_orders').select('download_files').eq('id',poId).single();
  const files = po?.download_files || [];
  if(files[idx]?.path) await sb.storage.from('po-docs').remove([files[idx].path]);
  files.splice(idx,1);
  await sb.from('purchase_orders').update({download_files: files}).eq('id',poId);
  await loadPOs();
  loadDownloadFilesPO(poId);
  toast('File dihapus');
}

    // Auto-create KB entry
    const { data: ticket } = await sb.from('service_tickets').select('*,service_logs(*)').eq('id', id).single();
    if (ticket) {
      const tahapanList = [...new Set((ticket.service_logs || []).map(l => l.tahapan))];
      await sb.from('kb_entries').insert({ ticket_id: id, judul: ticket.deskripsi_masalah?.substring(0, 100) || 'Service Report', kategori_unit: ticket.unit_info || '', ringkasan_masalah: ticket.deskripsi_masalah, ringkasan_solusi: (ticket.service_logs || []).filter(l => l.is_resolved).map(l => l.hasil).filter(Boolean).join('\n') || null, tahapan_digunakan: tahapanList, created_by: currentUser.id });
    }
  }
  await sb.from('service_tickets').update(upd).eq('id', id);
  toast('Status → ' + status);

  openSvcDetail(id);
}

    await sb.from('service_tickets').insert({ ...payload, id, status: 'Masuk', created_by: currentUser.id });

async function saveSvcLog(ticketId) {
  const tahapan = gv('logTahapan'), catatan = gv('logCatatan').trim(), hasil = gv('logHasil').trim();
  if (!tahapan) { toast('Pilih tahapan'); return; }
  const isResolved = document.getElementById('logResolved').checked;
  await sb.from('service_logs').insert({ ticket_id: ticketId, tahapan, catatan: catatan || null, hasil: hasil || null, is_resolved: isResolved, user_id: currentUser.id });
  // Update ticket to Proses if still Masuk
  const ticket = allServices.find(s => s.id === ticketId);
  if (ticket?.status === 'Masuk') await sb.from('service_tickets').update({ status: 'Proses', updated_at: new Date().toISOString() }).eq('id', ticketId);
  toast('Log ditambahkan');
  await loadServices();
  openSvcDetail(ticketId);
}

async function uploadSvcDoc(ticketId, type, input) {
  for (const f of Array.from(input.files)) {
    const path = `${ticketId}/${type}/${Date.now()}_${f.name}`;
    const { error } = await sb.storage.from('service-docs').upload(path, f);
    if (!error) { await sb.from('service_docs').insert({ ticket_id: ticketId, file_name: f.name, file_path: path, file_size: f.size, file_type: type, uploaded_by: currentUser.id }); toast(f.name + ' diupload'); }
    else toast('Gagal: ' + f.name);
  }
  input.value = '';
  await loadServices();
  openSvcDetail(ticketId);
}

async function deleteSvcDoc(docId, filePath, fileName) {
  if (!confirm('Hapus "' + fileName + '"?')) return;
  await sb.storage.from('service-docs').remove([filePath]);
  await sb.from('service_docs').delete().eq('id', docId);
  toast('Dihapus');
  const ticketId = filePath.split('/')[0];
  await loadServices();
  openSvcDetail(ticketId);
}

async function deleteSvcTicket(id) {
  if (!confirm('Hapus tiket ini beserta semua log dan dokumen?')) return;
  const s = allServices.find(x => x.id === id);
  const docs = s?.service_docs || [];
  if (docs.length) await sb.storage.from('service-docs').remove(docs.map(d => d.file_path));
  await sb.from('service_tickets').delete().eq('id', id);
  closeAllModals();
  toast('Tiket dihapus');
  await loadServices();
}

async function loadKBs() {
  const { data } = await sb.from('kb_entries').select('*,app_users!kb_entries_created_by_fkey(full_name),service_tickets(id,tgl_laporan,customer_name)').order('created_at', { ascending: false });
  allKBs = data || [];
  renderKBCards();
}

function renderKBCards() {
  const q = kbSearch.toLowerCase();
  const rows = allKBs.filter(k => [k.judul, k.kategori_unit, k.ringkasan_masalah, k.ringkasan_solusi].join(' ').toLowerCase().includes(q));
  const container = document.getElementById('kbContainer');
  if (!container) return;
  if (!rows.length) { container.innerHTML = noData('Belum ada entry knowledge base. Entry akan muncul otomatis ketika tiket service diselesaikan.'); return; }
  container.innerHTML = `<div class="kb-grid">${rows.map(k => `
    <div class="kb-card" onclick="openKBDetail('${k.id}')">
      <div style="font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.4">${k.judul}</div>
      ${k.kategori_unit ? `<div class="kb-tag">${k.kategori_unit}</div>` : ''}
      ${(k.tahapan_digunakan || []).map(t => `<div class="kb-tag" style="color:${SVC_TAHAPAN_COLORS[t] || 'var(--text2)'}">${t}</div>`).join('')}
      <div style="font-size:12px;color:var(--text3);margin-top:8px">${fmtDate(k.service_tickets?.tgl_laporan)} &middot; ${k.app_users?.full_name || '—'}</div>
    </div>`).join('')}</div>`;
}

async function openKBDetail(id) {
  const k = allKBs.find(x => x.id === id);
  if (!k) return;
  const isCreator = k.created_by === currentUser.id;
  openModal(`<div class="modal modal-sm">
    <div class="modal-header"><h2>Detail Knowledge Base</h2><button class="btn btn-ghost btn-sm" onclick="closeAllModals()">&#x2715;</button></div>
    <div class="modal-body">
      <div class="detail-section">
        <div style="font-size:16px;font-weight:600;margin-bottom:8px">${k.judul}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${k.kategori_unit ? `<span class="kb-tag">${k.kategori_unit}</span>` : ''}${(k.tahapan_digunakan || []).map(t => `<span class="kb-tag" style="color:${SVC_TAHAPAN_COLORS[t] || 'var(--text2)'}">${t}</span>`).join('')}</div>
        <div style="font-size:12px;color:var(--text3)">${fmtDateTime(k.created_at)} &middot; ${k.app_users?.full_name || '—'}</div>
      </div>
      <div class="detail-section">
        <div class="sect-title">Masalah</div>
        <div class="desc-box">${k.ringkasan_masalah || '—'}</div>
      </div>
      <div class="detail-section">
        <div class="sect-title">Solusi / Penanganan</div>
        ${isCreator ? `<textarea id="kbSolusiEdit" style="width:100%">${k.ringkasan_solusi || ''}</textarea>` : `<div class="desc-box">${k.ringkasan_solusi || 'Belum ada catatan solusi'}</div>`}
      </div>
      <div style="font-size:12px;color:var(--text3)">Ref: Tiket ${k.ticket_id} — ${fmtDate(k.service_tickets?.tgl_laporan)}</div>
    </div>
    <div class="modal-footer" style="justify-content:space-between">
      ${isCreator ? `<button class="btn btn-sm btn-danger" onclick="deleteKB('${k.id}')">Hapus</button><button class="btn btn-sm btn-primary" onclick="saveKBSolusi('${k.id}')">Simpan Solusi</button>` : '<div></div><button class="btn btn-sm" onclick="closeAllModals()">Tutup</button>'}
    </div>
  </div>`);
}

async function saveKBSolusi(id) {
  const solusi = document.getElementById('kbSolusiEdit')?.value.trim();
  await sb.from('kb_entries').update({ ringkasan_solusi: solusi, updated_at: new Date().toISOString() }).eq('id', id);
  toast('Solusi disimpan');
  closeAllModals();
  await loadKBs();
}

async function deleteKB(id) {
  if (!confirm('Hapus entry ini?')) return;
  await sb.from('kb_entries').delete().eq('id', id);
  toast('Entry dihapus');
  closeAllModals();
  await loadKBs();
}

const ROLE_LABELS = { owner: 'Owner', admin: 'Admin', direktur: 'Direktur', sales: 'Sales', engineering: 'ET Support', produksi: 'Produksi', logistik: 'Logistik', teknisi: 'Teknisi' };

        <button class="hamburger" onclick="openSidebar()"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <div><div class="page-title">Kelola User</div><div class="page-sub">Manajemen akun dan permission</div></div>
      </div>
      <div class="topbar-right"><button class="btn btn-primary" onclick="openUserForm()">+ User Baru</button></div>
    </div>
    <div class="page-body">

        <div class="table-wrap">

            <thead><tr><th>Username</th><th>Nama</th><th>Role</th><th>Status</th><th>Login Terakhir</th><th></th></tr></thead>
            <tbody id="userTableBody"><tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text3)"><span class="spinner"></span>Memuat...</td></tr></tbody>

async function loadUsers() {
  const { data } = await sb.from('app_users').select('*').order('role').order('full_name');
  allUsers = data || [];
  const tbody = document.getElementById('userTableBody');
  if (!tbody) return;
  if (!allUsers.length) { tbody.innerHTML = `<tr><td colspan="6">${noData()}</td></tr>`; return; }
  tbody.innerHTML = allUsers.map(u => `
    <tr>
      <td class="mono">${u.username}</td>
      <td style="font-weight:500">${u.full_name}</td>
      <td><span class="role-badge ${ROLE_CLASSES[u.role] || ''}">${ROLE_LABELS[u.role] || u.role}</span></td>
      <td><span style="font-size:11px;font-weight:600;color:${u.is_active ? 'var(--green)' : 'var(--text3)'}">${u.is_active ? 'Aktif' : 'Nonaktif'}</span></td>
      <td style="color:var(--text3);font-size:12px">${u.last_login ? fmtDateTime(u.last_login) : '—'}</td>
      <td><button class="btn btn-sm" data-uid="${u.id}" onclick="openUserForm(this.dataset.uid)">Edit</button></td>
    </tr>`).join('');
}

async function openUserForm(userId) {
  const u = userId ? allUsers.find(x => x.id === userId) : null;
  const roles = Object.keys(ROLE_LABELS).filter(r => isOwner() || r !== 'owner');
  openModal(`<div class="modal modal-sm">
    <div class="modal-header"><h2>${u ? 'Edit User' : 'User Baru'}</h2><button class="btn btn-ghost btn-sm" onclick="closeAllModals()">&#x2715;</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-row"><label>Username <span class="req">*</span></label><input type="text" id="ufUsername" value="${u?.username || ''}" placeholder="username" autocomplete="off"></div>
        <div class="form-row"><label>Nama Lengkap <span class="req">*</span></label><input type="text" id="ufFullName" value="${u?.full_name || ''}" placeholder="Nama lengkap"></div>
      </div>
      <div class="form-row"><label>Role <span class="req">*</span></label>
        <select id="ufRole" style="width:100%;padding:6px 8px">
          <option value="">-- Pilih Role --</option>
          ${roles.map(r => `<option value="${r}" ${u?.role === r ? 'selected' : ''}>${ROLE_LABELS[r]}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <label>Password${u ? ' <span style="font-weight:400;color:var(--text3)">(kosongkan jika tidak diubah)</span>' : ' <span class="req">*</span>'}</label>
        <input type="password" id="ufPassword" placeholder="Password" autocomplete="new-password">
      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px"><input type="checkbox" id="ufActive" ${u?.is_active !== false ? 'checked' : ''}><span>Aktif</span></label>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAllModals()">Batal</button>
      <button class="btn btn-primary" data-uid="${userId || ''}" onclick="saveUser(this.dataset.uid)">Simpan</button>
    </div>
  </div>`);
}

async function saveUser(editId) {
  const username = gv('ufUsername').trim(), fullName = gv('ufFullName').trim(), role = gv('ufRole'), pw = gv('ufPassword');
  if (!username || !fullName || !role) { toast('Lengkapi field wajib'); return; }
  if (!editId && !pw) { toast('Password wajib untuk user baru'); return; }
  const payload = { username, full_name: fullName, role, is_active: document.getElementById('ufActive').checked };
  if (pw) payload.password_hash = await sha256(pw);
  if (editId) {
    if (!pw) delete payload.password_hash;
    await sb.from('app_users').update(payload).eq('id', editId);
  } else {
    payload.id = 'usr-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 5);
    await sb.from('app_users').insert(payload);
  }
  toast(editId ? 'User diperbarui' : 'User baru dibuat');
  closeAllModals();
  await loadUsers();
}

// SPEC FIELDS & SERIAL NUMBER (dari sistem lama)
// ═══════════════════════════════════════════════════════════
const SPEC_FIELDS = {
  Rectifier: [
    {id:'input_fase', label:'Fase Input', type:'select', options:['1','3']},
    {id:'input_voltage', label:'Tegangan Input (VAC)', placeholder:'220, 380'},
    {id:'input_voltage_tolerance', label:'Toleransi Input', placeholder:'+/-15%'},
    {id:'input_frequency', label:'Frekuensi Input (Hz)', placeholder:'50'},
    {id:'pulse', label:'Pulse', type:'select', options:['6','12','24']},
    {id:'output_voltage', label:'Tegangan Output (VDC)', placeholder:'24, 48, 110, 220'},
    {id:'output_current', label:'Rating Output (A)', placeholder:'10, 20, 50'},
    {id:'battery_voltage', label:'Tegangan Baterai (V)', placeholder:'Opsional'},
    {id:'notes', label:'Catatan', type:'textarea'},
  ],
  UPS: [
    {id:'input_fase', label:'Fase Input', type:'select', options:['1','3']},
    {id:'output_fase', label:'Fase Output', type:'select', options:['1','3']},
    {id:'input_voltage', label:'Tegangan Input (VAC)', placeholder:'220, 380'},
    {id:'input_frequency', label:'Frekuensi Input (Hz)', placeholder:'50'},
    {id:'output_voltage', label:'Tegangan Output (VAC)', placeholder:'220, 380'},
    {id:'output_kva', label:'Kapasitas Output (kVA)', placeholder:'1, 2, 5, 10'},
    {id:'output_frequency', label:'Frekuensi Output (Hz)', placeholder:'50'},
    {id:'battery_voltage', label:'Tegangan Baterai (V)', placeholder:'Opsional'},
    {id:'notes', label:'Catatan', type:'textarea'},
  ],
  Inverter: [
    {id:'dc_input_voltage', label:'Tegangan Input DC (VDC)', placeholder:'24, 48, 110, 220'},
    {id:'output_voltage', label:'Tegangan Output (VAC)', placeholder:'220, 380'},
    {id:'output_kva', label:'Kapasitas Output (kVA)', placeholder:'1, 2, 5'},
    {id:'output_frequency', label:'Frekuensi Output (Hz)', placeholder:'50'},
    {id:'notes', label:'Catatan', type:'textarea'},
  ],
  'Panel ACDB': [
    {id:'input_voltage', label:'Tegangan Input (VAC)', placeholder:'400/230, 380, 220'},
    {id:'input_fase', label:'Fase Input', type:'select', options:['1','3']},
    {id:'output_current', label:'Rating Arus (A)', placeholder:'63, 100, 160'},
    {id:'notes', label:'Catatan', type:'textarea'},
  ],
  'Panel DCDB': [
    {id:'input_voltage', label:'Tegangan Input (VDC)', placeholder:'24, 48, 110, 220'},
    {id:'output_current', label:'Rating Arus (A)', placeholder:'50, 100, 200'},
    {id:'notes', label:'Catatan', type:'textarea'},
  ],
};

const SPEC_CATEGORIES = Object.keys(SPEC_FIELDS);
const MONTH_CODES = ['A','B','C','D','E','F','G','H','I','J','K','L'];
function yearCode(y){ return String.fromCharCode(65 + (y - 2025)); }
function monthCode(m){ return MONTH_CODES[m-1]||'A'; }
function voltageCode(v){ const map={'24':'24','48':'48','110':'11','220':'22','380':'38','400':'40'}; return map[String(v)]||String(v).slice(0,2); }
function ratingCode(r){ const n=parseFloat(r)||0; if(n<10) return String(Math.round(n*10)).padStart(2,'0'); return String(Math.round(n)).padStart(2,'0').slice(-2); }

function buildSerialNumberFromSpec(spec, noProject, huruf, angka, prodDate){
  const y=yearCode(prodDate.getFullYear());
  const m=monthCode(prodDate.getMonth()+1);
  const proj=(noProject||'').replace(/[^0-9]/g,'').slice(-3).padStart(3,'0');
  const angkaStr=String(angka).padStart(3,'0');
  const cat=spec.kategori;
  if(cat==='Rectifier'){
    const fase=spec.input_fase||'1';
    const pulse=(spec.pulse||'6').padStart(2,'0');
    const vout=voltageCode(spec.output_voltage||'');
    const rout=ratingCode(spec.output_current||'');
    return 'R'+y+m+fase+pulse+vout+rout+proj+huruf+angkaStr;
  } else if(cat==='UPS'){
    const fase=spec.input_fase||'1';
    const vout=voltageCode(spec.output_voltage||'');
    const rout=ratingCode(spec.output_kva||'');
    return 'U'+y+m+fase+'06'+vout+rout+proj+huruf+angkaStr;
  } else if(cat==='Inverter'){
    const dcin=voltageCode(spec.dc_input_voltage||'');
    const vout=voltageCode(spec.output_voltage||'');
    const rout=ratingCode(spec.output_kva||'');
    return 'I'+y+m+dcin+vout+rout+proj+huruf+angkaStr;
  } else if(cat==='Panel DCDB'||cat==='DCDB'){
    return 'D'+y+m+proj+huruf+angkaStr;
  } else if(cat==='Panel ACDB'||cat==='ACDB'){
    return 'A'+y+m+proj+huruf+angkaStr;
  }
  return null;
}

function renderSpecForm(category, values){
  const fields = SPEC_FIELDS[category];
  if(!fields) return '<div style="color:var(--text3);font-size:13px">Spec tidak tersedia untuk kategori ini.</div>';
  let html = '<div class="form-grid">';
  fields.forEach(f=>{
    const val = values[f.id]||'';
    if(f.type==='select'){
      const opts = f.options.map(o=>'<option value="'+o+'"'+(val==o?' selected':'')+'>'+o+'</option>').join('');
      html += '<div class="form-row"><label>'+f.label+'</label><select id="spec_'+f.id+'" style="width:100%;padding:6px 8px">'+opts+'</select></div>';
    } else if(f.type==='textarea'){
      html += '<div class="form-row" style="grid-column:1/-1"><label>'+f.label+'</label><textarea id="spec_'+f.id+'" placeholder="'+(f.placeholder||'')+'" rows="2">'+val+'</textarea></div>';
    } else {
      html += '<div class="form-row"><label>'+f.label+'</label><input type="text" id="spec_'+f.id+'" value="'+val+'" placeholder="'+(f.placeholder||'')+'"></div>';
    }
  });
  html += '</div>';
  return html;
}

function buildModelName(cat, spec){
  const v=f=>spec[f]||'';
  if(cat==='Rectifier') return 'S-Pro'+(v('input_fase')||'1')+' '+(v('output_voltage')||'')+(v('output_current')?'-'+v('output_current')+'A':'');
  if(cat==='UPS'){ const kva=v('output_kva'); return 'A-Pro'+(v('input_fase')||'3')+'/'+(v('output_fase')||'1')+' '+(kva?kva+'K':''); }
  if(cat==='Inverter'){ const kva=v('output_kva'); return 'INV '+(kva?kva+'K':''); }
  if(cat==='Panel ACDB') return 'ACDB '+(v('input_voltage')||'')+'V-'+(v('output_current')||'')+'A';
  if(cat==='Panel DCDB') return 'DCDB '+(v('input_voltage')||'')+'V-'+(v('output_current')||'')+'A';
  return '';
}

let _specCtx = {};
let _specFormCtx = {}; // for PO form step 2

async function openItemSpec(itemId, poId){
  _specCtx = {itemId, poId};
  const po = allPOs.find(p=>p.id===poId);
  const item = po?.po_items?.find(i=>i.id===itemId);
  if(!item) return;
  const cat = item.category||'';
  _specCtx.category = cat;
  let spec = null; try { const _r = await sb.from('item_specs').select('*').eq('item_id',itemId).single(); spec = _r.data; } catch(e) {}
  openModal('<div class="modal modal-sm">'
    +'<div class="modal-header"><div><h2>Spesifikasi Item</h2><div style="font-size:12px;color:var(--text3);margin-top:2px">'+cat+(item.model_name?' — '+item.model_name:'')+'</div></div><button class="btn btn-ghost btn-sm" onclick="closeAllModals()">&#x2715;</button></div>'
    +'<div class="modal-body">'+renderSpecForm(cat, spec||{})+'</div>'
    +'<div class="modal-footer"><button class="btn" onclick="closeAllModals()">Batal</button><button class="btn btn-primary" onclick="saveItemSpec()">Simpan Spec</button></div>'
    +'</div>');
}

async function saveItemSpec(){
  const {itemId, poId, category} = _specCtx;
  const fields = SPEC_FIELDS[category]||[];
  const data = {item_id: itemId, kategori: category, updated_at: new Date().toISOString()};
  fields.forEach(f=>{ const el=document.getElementById('spec_'+f.id); if(el) data[f.id]=el.value.trim()||null; });
  let existing = null; try { const _r = await sb.from('item_specs').select('id').eq('item_id',itemId).single(); existing = _r.data; } catch(e) {}
  if(existing){ await sb.from('item_specs').update(data).eq('item_id',itemId); }
  else { data.id='spec-'+Date.now().toString(36); await sb.from('item_specs').insert(data); }
  toast('Spec disimpan');
  closeAllModals();
  await loadPOs();
  openPODetail(poId);
}
