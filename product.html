<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAE Energy — Product Information</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#CC0000;--green:#1a7a3c;--white:#fff;--offwhite:#f7f7f7;--border:#e0e0e0;--text:#1a1a1a;--muted:#666}
body{font-family:'DM Sans',sans-serif;background:var(--offwhite);color:var(--text);min-height:100vh}
.lock-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-height(135deg,#f7f7f7,#eaf5ee);padding:1rem;background:#f0f7f2}
.lock-card{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;border:1px solid var(--border);box-shadow:0 8px 40px rgba(0,0,0,.08)}
.lock-logo{width:160px;margin:0 auto 1.5rem;display:block}
.lock-card h2{font-size:18px;font-weight:700;margin-bottom:6px}
.lock-card p{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.lock-input{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;text-align:center;letter-spacing:3px;margin-bottom:10px;outline:none;transition:border-color .2s}
.lock-input:focus{border-color:var(--green)}
.lock-btn{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-family:inherit;font-weight:600;cursor:pointer}
.lock-btn:hover{background:#15632f}
.lock-error{color:var(--red);font-size:13px;margin-top:8px;display:none}
.app{display:none}
.header{background:#fff;border-bottom:3px solid var(--red)}
.header-inner{max-width:960px;margin:0 auto;padding:.875rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.header-logo{height:38px;object-fit:contain}
.header-right{display:flex;align-items:center;gap:10px}
.badge-green{background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase}
.hero{background:#fff;border-bottom:1px solid var(--border)}
.hero-inner{max-width:960px;margin:0 auto;padding:2rem 1.5rem;display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:start}
.hero-customer-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:4px}
.hero-customer{font-size:22px;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.hero-project{font-size:14px;color:var(--muted);margin-bottom:20px}
.units-grid{display:flex;flex-direction:column;gap:8px}
.unit-row{background:var(--offwhite);border-radius:10px;padding:12px 14px;border-left:4px solid var(--red)}
.unit-cat{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--red);letter-spacing:.05em;margin-bottom:2px}
.unit-model{font-size:16px;font-weight:700;margin-bottom:4px}
.unit-sn{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);line-height:1.8}
.tabs-wrap{max-width:960px;margin:0 auto;padding:0 1.5rem}
.tab-bar{display:flex;border-bottom:2px solid var(--border);margin-top:1.25rem;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;border-radius:6px 6px 0 0;transition:all .15s;flex-shrink:0}
.tab-btn:hover{color:var(--text);background:var(--offwhite)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
.content{max-width:960px;margin:0 auto;padding:1.25rem 1.5rem}
.section{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1rem;border:1px solid var(--border)}
.sect-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:1rem;padding-bottom:8px;border-bottom:2px solid var(--green);display:inline-block}
.spec-table{width:100%;border-collapse:collapse}
.spec-table tr:not(:last-child) td{border-bottom:1px solid #f0f0f0}
.spec-key{font-size:13px;color:var(--muted);padding:9px 0;width:50%}
.spec-val{font-size:13px;font-weight:600;padding:9px 0;text-align:right}
.sn-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.sn-chip{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;background:var(--offwhite);border:1px solid var(--border);padding:6px 12px;border-radius:8px;letter-spacing:1px}
.dl-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
.dl-item:last-child{border-bottom:none}
.dl-btn{padding:7px 18px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.contact-card{background:var(--offwhite);border-radius:10px;padding:1.25rem;border-left:4px solid var(--red)}
.contact-card h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--red);margin-bottom:8px}
.contact-card p{font-size:13px;color:var(--muted);line-height:1.8}
.footer{background:var(--text);color:#888;text-align:center;padding:1.5rem;font-size:12px;margin-top:2rem}
.footer span{color:var(--red)}
.loading{text-align:center;padding:4rem;color:var(--muted);font-size:14px}
@media(max-width:600px){
  .hero-inner{grid-template-columns:1fr}
  .hero-qr{display:none}
  .hero-customer{font-size:18px}
  .contact-grid{grid-template-columns:1fr}
}
</style>
</head>

const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzd3Nsd2RkZW1hY2t4cnJicHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTE2MjcsImV4cCI6MjA5MTMyNzYyN30.aQivrCTGvzJ6-_OLUOUvFjOcu7qQ53Ajv2urvLZb9xg';
const sb=supabase.createClient(SB_URL,SB_KEY);
const params=new URLSearchParams(location.search);
const PO_ID=params.get('id');
const NO_PROJECT=params.get('proj')||'';
const _proj = NO_PROJECT.replace(/[^0-9]/g,'').slice(-3);
const EXPECTED_PWD = _proj ? 'sae'+_proj : 'sae';
const MONTH_ID=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
let poData=null, allItems=[];

function checkPassword(){
  const pwd=document.getElementById('lockPwd').value.trim().toLowerCase();
  if(pwd===EXPECTED_PWD){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('app').style.display='block';
    loadPO();
  }else{
    document.getElementById('lockError').style.display='block';
  }
}

async function loadPO(){
  if(!PO_ID){document.getElementById('heroSection').innerHTML='<div class="loading">PO tidak ditemukan.</div>';return;}
  const{data:po}=await sb.from('purchase_orders')
    .select('*,po_items(*,item_specs(*))')
    .eq('id',PO_ID).single();
  if(!po){document.getElementById('heroSection').innerHTML='<div class="loading">Data tidak ditemukan.</div>';return;}
  poData=po;
  allItems=(po.po_items||[]).filter(it=>it.is_produksi);

  // Hero
  const unitRows=allItems.map(it=>{
    const snList=(it.serial_number||'').split(',').map(s=>s.trim()).filter(Boolean);
    return `<div class="unit-row">
      <div class="unit-cat">${it.category}</div>
      <div class="unit-model">${it.model_name||'—'}</div>
      <div class="unit-sn">${snList.length?snList.join(' &nbsp;|&nbsp; '):'Serial belum di-generate'}</div>
    </div>`;
  }).join('');

  document.getElementById('heroSection').innerHTML=`
    <div class="hero-inner">
      <div>
        <div class="hero-customer-label">Customer</div>
        <div class="hero-customer">${po.customer_name||'—'}</div>
        <div class="hero-project">${po.project_name||''} ${po.no_project?'· '+po.no_project:''}</div>
        <div class="units-grid">${unitRows}</div>
      </div>
      <div class="hero-qr">
        <div id="qrcode" style="border:2px solid var(--border);border-radius:10px;padding:6px;background:#fff"></div>
        <div style="font-size:10px;text-align:center;color:var(--muted);margin-top:6px">Scan untuk info produk</div>
      </div>
    </div>`;

  new QRCode(document.getElementById('qrcode'),{text:window.location.href,width:120,height:120,colorDark:'#1a1a1a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});

  // Build tabs
  buildTabs();
}

function buildTabs(){
  const tabBar=document.getElementById('tabBar');
  const tabs=[
    {id:'beranda',label:'Beranda'},
    ...allItems.map((it,i)=>({id:'item_'+i,label:it.model_name||it.category})),
    {id:'download',label:'Download'},
    {id:'contact',label:'Kontak'}
  ];
  tabBar.innerHTML=tabs.map(t=>`<button class="tab-btn${t.id==='beranda'?' active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}',this)">${t.label}</button>`).join('');
  renderTab('beranda');
}

function switchTab(tabId,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderTab(tabId);
}

function renderTab(tabId){
  const content=document.getElementById('tabContent');
  if(tabId==='beranda') renderBeranda(content);
  else if(tabId.startsWith('item_')){
    const idx=parseInt(tabId.replace('item_',''));
    renderItemSpec(content, allItems[idx]);
  }
  else if(tabId==='download') renderDownload(content);
  else if(tabId==='contact') renderContact(content);
}

function renderBeranda(content){
  const rows=allItems.map(it=>{
    const spec=it.item_specs||{};
    const snList=(it.serial_number||'').split(',').map(s=>s.trim()).filter(Boolean);
    const prodDate=it.serial_generated_at?new Date(it.serial_generated_at):null;
    const prodDateStr=prodDate?MONTH_ID[prodDate.getMonth()]+' '+prodDate.getFullYear():'—';
    let specSummary='';
    if(it.category==='Rectifier') specSummary=`Input: ${spec.input_voltage||'—'} VAC ${spec.input_fase||''}Ph &nbsp;|&nbsp; Output: ${spec.output_voltage||'—'} VDC ${spec.output_current||'—'} A`;
    else if(it.category==='UPS') specSummary=`Input: ${spec.input_voltage||'—'} VAC ${spec.input_fase||''}Ph &nbsp;|&nbsp; Output: ${spec.output_voltage||'—'} VAC ${spec.output_kva||'—'} kVA`;
    else if(it.category==='Inverter') specSummary=`DC Input: ${spec.dc_input_voltage||'—'} VDC &nbsp;|&nbsp; Output: ${spec.output_voltage||'—'} VAC ${spec.output_kva||'—'} kVA`;
    else if(it.category==='Panel ACDB') specSummary=`Input: ${spec.input_voltage||'—'} VAC &nbsp;|&nbsp; Rating: ${spec.output_current||'—'} A`;
    else if(it.category==='Panel DCDB') specSummary=`Input: ${spec.input_voltage||'—'} VDC &nbsp;|&nbsp; Rating: ${spec.output_current||'—'} A`;
    return `<div class="section" style="border-left:4px solid var(--red)">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--red);letter-spacing:.05em;margin-bottom:4px">${it.category}</div>
          <div style="font-size:20px;font-weight:700;margin-bottom:6px">${it.model_name||'—'}</div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${specSummary}</div>
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Serial Number${snList.length>1?'s':''}</div>
          <div class="sn-chips">${snList.length?snList.map(sn=>`<span class="sn-chip">${sn}</span>`).join(''):'<span style="font-size:13px;color:var(--muted)">Belum di-generate</span>'}</div>
        </div>
        <div style="font-size:12px;color:var(--muted);text-align:right;flex-shrink:0">
          <div>Qty: <strong>${it.qty||1}</strong></div>
          <div style="margin-top:4px">Produksi: <strong style="color:var(--text)">${prodDateStr}</strong></div>
        </div>
      </div>
    </div>`;
  }).join('');
  content.innerHTML=rows||'<div class="loading">Belum ada item</div>';
}

const row=(k,v)=>`<tr><td class="spec-key">${k}</td><td class="spec-val">${v}</td></tr>`;

function renderItemSpec(content, it){
  if(!it){content.innerHTML='<div class="loading">Item tidak ditemukan.</div>';return;}
  const spec=it.item_specs||{};
  const snList=(it.serial_number||'').split(',').map(s=>s.trim()).filter(Boolean);
  const prodDate=it.serial_generated_at?new Date(it.serial_generated_at):null;
  const prodDateStr=prodDate?MONTH_ID[prodDate.getMonth()].toUpperCase()+' '+prodDate.getFullYear():'—';
  const cat=it.category;
  let rows='';
  if(cat==='Rectifier'){
    rows=row('Input Voltage',`${spec.input_voltage||'—'} VAC ±${spec.input_voltage_tolerance||'15%'}, ${spec.input_fase||'1'}Ph`)
      +row('Input Frequency',`${spec.input_frequency||'50'} Hz ± 5%`)
      +row('Output Voltage',`${spec.output_voltage||'—'} VDC (Adjustable)`)
      +row('Output Current',`${spec.output_current||'—'} A (Adjustable)`)
      +(spec.battery_voltage?row('Battery Voltage',spec.battery_voltage+' V'):'')
      +row('Pulse',`${spec.pulse||'6'} Pulse`);
  }else if(cat==='UPS'){
    rows=row('Input Voltage',`${spec.input_voltage||'—'} VAC, ${spec.input_fase||'3'}Ph`)
      +row('Input Frequency',`${spec.input_frequency||'50'} Hz`)
      +row('Output Voltage',`${spec.output_voltage||'—'} VAC, ${spec.output_fase||'1'}Ph`)
      +row('Output Capacity',`${spec.output_kva||'—'} kVA`)
      +row('Output Frequency',`${spec.output_frequency||'50'} Hz`)
      +(spec.battery_voltage?row('Battery Voltage',spec.battery_voltage+' V'):'');
  }else if(cat==='Inverter'){
    rows=row('DC Input Voltage',`${spec.dc_input_voltage||'—'} VDC`)
      +row('Output Voltage',`${spec.output_voltage||'—'} VAC`)
      +row('Output Capacity',`${spec.output_kva||'—'} kVA`)
      +row('Output Frequency',`${spec.output_frequency||'50'} Hz`);
  }else if(cat==='Panel ACDB'){
    rows=row('Input Voltage',`${spec.input_voltage||'—'} VAC, ${spec.input_fase||'3'}Ph`)
      +row('Current Rating',`${spec.output_current||'—'} A`);
  }else if(cat==='Panel DCDB'){
    rows=row('Input Voltage',`${spec.input_voltage||'—'} VDC`)
      +row('Current Rating',`${spec.output_current||'—'} A`);
  }
  rows+=row('Tanggal Produksi',prodDateStr)
    +row('No. Project',poData?.no_project||'—')
    +row('No. PO',poData?.no_po||'—');
  if(spec.notes) rows+=row('Catatan',spec.notes);

  content.innerHTML=`
    <div class="section">
      <div class="sect-title">Spesifikasi Teknis</div>
      <table class="spec-table">${rows}</table>
    </div>
    <div class="section">
      <div class="sect-title">Serial Number${snList.length>1?'s':''}</div>
      <div class="sn-chips">${snList.length?snList.map(sn=>`<span class="sn-chip">${sn}</span>`).join(''):'<span style="color:var(--muted)">Belum di-generate</span>'}</div>
    </div>`;
}

function renderDownload(content){
  const files=poData?.download_files||[];
  let html='<div class="section"><div class="sect-title">File Download</div>';
  if(!files.length) html+='<div style="font-size:13px;color:var(--muted);padding:1rem 0">Belum ada file tersedia.</div>';
  else html+=files.map(f=>`<div class="dl-item"><div style="font-size:13px;font-weight:500">${f.name}</div><a href="${f.url}" target="_blank" class="dl-btn">Download</a></div>`).join('');
  html+='</div>';
  content.innerHTML=html;
}

function renderContact(content){
  content.innerHTML=`
    <div class="contact-grid">
      <div class="contact-card"><h4>Head Office</h4><p>Graha SAE Villa Mutiara Gading 3<br>Blok E1 No 21-22, Bekasi 17610<br>Phone: 021-89133001<br>021-89135128<br>Fax: 021-89135129</p></div>
      <div class="contact-card"><h4>Marketing &amp; Workshop</h4><p>Ruko Emerald Boulevard<br>Blok EB1 No. 30-31<br>Kota Harapan Indah, Bekasi Barat<br>Jawa Barat 17131<br>Phone: 021-88895353</p></div>
    </div>`;
}
</script>
</body>
</html>
